/* ================= MODALS ================= */
function modal(title, inner){
  document.getElementById("modalRoot").innerHTML =
    '<div class="overlay" onclick="if(event.target===this)closeModal()">'
    + '<div class="sheet"><div class="sheet-head"><h2>'+title+'</h2>'
    + '<button aria-label="Close" style="color:var(--sub);padding:.3rem" onclick="closeModal()">'+icon("x",20)+'</button></div>'
    + inner + '</div></div>';
  focusFirstField();
}
/* Auto-focus the first real field so a mouse/keyboard user can start typing or tabbing right
   away. Scoped to pointer-fine devices (mouse/trackpad) — on a touch device this would pop
   the on-screen keyboard the instant a modal opens, which is more disruptive than helpful. */
function focusFirstField(){
  try{
    if(!(window.matchMedia && window.matchMedia("(pointer: fine)").matches)) return;
    var sheet = document.querySelector(".sheet");
    if(!sheet) return;
    var field = sheet.querySelector('input:not([type="hidden"]):not([disabled]), textarea:not([disabled]), select:not([disabled])');
    if(field){ field.focus(); if(field.select && field.tagName!=="SELECT") field.select(); }
  }catch(e){ /* best effort — never let this break modal opening */ }
}
function closeModal(){
  document.getElementById("modalRoot").innerHTML="";
  payId=null; editId=null; confirmDel=false;
  jEditId=null; jConfirmDel=false; sEditId=null; sConfirmDel=false;
  fundEditId=null; fundConfirmDel=false;
  devForgotArmed=false;
}

/* --- pay --- */
function openPay(id, occ){
  payId = id; payOcc = occ || 1;
  var b = billsList().filter(function(x){return x.id===id;})[0];
  if(!b) return;
  var y = view.y, m = view.m;
  var skipped = isSkipped(b, y, m);
  var data = touchMonth();
  var isVar = b.type==="variable";
  var full = fullAmountFor(b, data, payOcc);
  var l = leftOf(b, data, payOcc);
  var occNote = b.freq==="semimonthly" ? (payOcc===2 ? " · 2nd payment" : " · 1st payment") : "";
  var topBlock = '<p class="muted" style="font-size:.875rem;margin-bottom:'+(isVar?".35rem":"1rem")+'">'+usd(full)+' · '+freqText(b)+occNote+'</p>'
    + (isVar
        ? '<button style="all:unset;cursor:pointer;font-size:.78rem;font-weight:600;color:var(--pine)" onclick="toggleActualEdit()">Update the actual amount</button>'
          + '<div id="actualEditWrap" class="fgroup hidden" style="margin-top:.5rem">'
          + '<label class="flabel">Actual amount'+occNote+'</label>'
          + '<div style="display:flex;gap:.5rem">'
          + '<div class="money" style="flex:1;width:auto;border-radius:.75rem;padding:0 .75rem"><span>$</span>'
          + '<input id="payActual" class="tnum" inputmode="decimal" value="'+full+'" style="padding:.6rem 0 .6rem .25rem">'+calcBtn()+'</div>'
          + '<button class="btn btn-ink" onclick="paySaveActual()">Save</button></div>'
          + '<p class="muted" style="font-size:.72rem;margin-top:.35rem">Estimated '+usd(b.estimate)+'. This updates what\'s due — separate from marking it paid, and works anytime, paid or not.</p></div>'
        : '')
    + (isVar ? '<div style="margin-bottom:1rem"></div>' : '');
  modal(esc(b.name),
    topBlock
    + (skipped ? '<p style="font-size:.85rem;font-weight:600;margin-bottom:1rem">Skipped this month — nothing due.</p>' : '')
    + '<div class="grid2" style="margin-bottom:1rem">'
    + '<button class="btn btn-pine" onclick="paySet(0)"'+(skipped?' disabled':'')+'>'+icon("check",16)+' Paid in full</button>'
    + '<button class="btn btn-ghost" onclick="payClear()"'+(skipped?' disabled':'')+'>Not paid yet</button></div>'
    + '<label class="flabel">Amount still owed</label>'
    + '<div style="display:flex;gap:.5rem">'
    + '<div class="money" style="flex:1;width:auto;border-radius:.75rem;padding:0 .75rem">'
    + '<span>$</span><input id="payInput" class="tnum" inputmode="decimal" value="'+(l===0?"0":l)+'" '+(skipped?"disabled":"")+' '
    + 'style="padding:.6rem 0 .6rem .25rem;font-size:1rem" onkeydown="if(event.key===\'Enter\')paySave()">'+calcBtn()+'</div>'
    + '<button class="btn btn-ink" onclick="paySave()"'+(skipped?' disabled':'')+'>Save</button></div>'
    + '<p class="muted" style="font-size:.75rem;margin-top:.5rem">Enter 0 when it\'s paid.'+(l===0&&!skipped?' This bill is currently marked paid.':'')+'</p>'
    + '<div class="divider" style="margin:1rem 0"></div>'
    + '<button class="btn btn-ghost" style="width:100%" onclick="billSkipToggle()">'+(skipped?"Clear skip — due again this month":"Skip this month")+'</button>');
  var inp = document.getElementById("payInput");
  if(inp && !skipped){ inp.focus(); inp.select(); }
}
function toggleActualEdit(){
  var wrap = document.getElementById("actualEditWrap");
  if(!wrap) return;
  var hidden = wrap.className.indexOf("hidden")>=0;
  wrap.className = "fgroup" + (hidden ? "" : " hidden");
  if(hidden){
    var inp = document.getElementById("payActual");
    if(inp){ inp.focus(); inp.select(); }
  }
}
function paySaveActual(){
  var b = billsList().filter(function(x){return x.id===payId;})[0];
  if(!b || b.type!=="variable") return;
  var data = touchMonth();
  var oldFull = fullAmountFor(b, data, payOcc);
  var newVal = num(document.getElementById("payActual").value);
  if(!data.actuals) data.actuals = {};
  var key = leftKey(b.id, payOcc);
  data.actuals[key] = newVal;
  // Preserve any payment already made by shifting "still owed" by the same delta, so a
  // partial payment made against the old estimate isn't silently lost or duplicated.
  if(data.left && data.left[key]!==undefined && data.left[key]!==null){
    data.left[key] = num(Math.max(0, num(data.left[key]) + (newVal - oldFull)));
  }
  persist(); render();
  openPay(payId, payOcc); // reopen so "amount still owed" and everything else reflects the update
}
function paySet(v){ if(payId!==null){ setLeft(payId, v, payOcc); } closeModal(); }
function payClear(){ if(payId!==null){ setLeft(payId, undefined, payOcc); } closeModal(); }
function paySave(){
  var inp = document.getElementById("payInput");
  if(payId!==null && inp){ setLeft(payId, num(inp.value), payOcc); }
  closeModal();
}
/* --- goal-linked bills: their own pay modal — all-or-nothing, plus a skip-this-month option --- */
var goalUnpayArmed = false;
function openGoalBillPay(id, occ){
  payId = id; payOcc = occ || 1;
  goalUnpayArmed = false;
  var b = billsList().filter(function(x){return x.id===id;})[0];
  if(!b) return;
  var goal = S.savingsGoals.filter(function(g){ return g.id===b.linkedGoalId; })[0];
  var y = view.y, m = view.m;
  var data = touchMonth();
  var full = fullAmountFor(b, data, payOcc);
  var skipped = isSkipped(b, y, m);
  var paid = !skipped && leftOf(b, data, payOcc)===0;
  var occNote = b.freq==="semimonthly" ? (payOcc===2 ? " · 2nd payment" : " · 1st payment") : "";
  var depositNote = goal
    ? 'Marking this paid logs a '+usd(full)+' deposit to <b style="color:var(--ink)">'+esc(goal.name)+'</b>. Partial payments aren\'t supported for goal-linked bills.'
    : 'The savings goal this bill was linked to no longer exists, so marking it paid now behaves like a normal bill — no deposit will be logged.';
  modal(esc(b.name),
    '<p class="muted" style="font-size:.875rem;margin-bottom:.75rem">'+usd(full)+' · '+freqText(b)+occNote+'</p>'
    + '<p class="muted" style="font-size:.8rem;margin-bottom:1rem">'+depositNote+'</p>'
    + (skipped ? '<p style="font-size:.85rem;font-weight:600;margin-bottom:1rem">Skipped this month — nothing due, nothing logged.</p>' : '')
    + (paid
        ? '<button id="goalUnpayBtn" class="btn btn-ghost" style="width:100%;margin-bottom:.5rem" onclick="goalBillUnpay()">Mark not paid</button>'
        : '<button class="btn btn-pine" style="width:100%;margin-bottom:.5rem" onclick="goalBillMarkPaid()"'+(skipped?' disabled':'')+'>'+icon("check",16)+' Mark paid in full</button>')
    + '<button class="btn btn-ghost" style="width:100%" onclick="billSkipToggle()">'+(skipped?"Clear skip — due again this month":"Skip this month")+'</button>');
}
function goalBillMarkPaid(){
  var b = billsList().filter(function(x){return x.id===payId;})[0];
  if(!b) return;
  createGoalDeposit(b, view.y, view.m, payOcc);
  setLeft(payId, 0, payOcc);
  closeModal();
}
function goalBillUnpay(){
  var b = billsList().filter(function(x){return x.id===payId;})[0];
  if(!b) return;
  var entry = goalDepositEntry(payId, view.y, view.m, payOcc);
  if(entry && !goalUnpayArmed){
    goalUnpayArmed = true;
    var btn = document.getElementById("goalUnpayBtn");
    if(btn){ btn.textContent = "Tap again — this deletes the "+usd(entry.amount)+" deposit"; btn.className = "btn btn-danger armed"; }
    return;
  }
  if(entry) deleteGoalDeposit(payId, view.y, view.m, payOcc);
  setLeft(payId, undefined, payOcc);
  closeModal();
}
/* Shared by both the regular pay modal and the goal-linked pay modal, so there's exactly one
   place that knows how to skip a bill — cleaning up any goal deposit if it's linked, and
   always routing the actual "left" clear through setLeft so any auto-reduce-balance
   adjustment gets reversed correctly rather than silently left in place. */
function billSkipToggle(){
  var b = billsList().filter(function(x){return x.id===payId;})[0];
  if(!b) return;
  var y = view.y, m = view.m;
  if(!b.skipMonths) b.skipMonths = [];
  var key = mk(y,m);
  var i = b.skipMonths.indexOf(key);
  if(i>=0){
    b.skipMonths.splice(i,1);
    persist(); closeModal(); render();
    if(S.remindersOn) scheduleRemindersDebounced();
  } else {
    if(b.linkedGoalId){
      var entry = goalDepositEntry(b.id, y, m, payOcc);
      if(entry) deleteGoalDeposit(b.id, y, m, payOcc);
    }
    b.skipMonths.push(key);
    setLeft(b.id, undefined, payOcc); // clears "left", reverses any auto-reduce-balance adjustment, persists/renders/reschedules
    closeModal();
  }
}

function expSave(){
  var type = document.getElementById("expType").value;
  var name = document.getElementById("expName").value.trim();
  var amount = num(document.getElementById("expAmount").value);
  var active = document.getElementById("expActive").getAttribute("data-on")==="1";
  var err = document.getElementById("expErr");
  function fail(m){ err.textContent=m; err.style.display="block"; }
  if(!name) return fail("Give it a name.");
  if(!amount) return fail("Enter an amount above zero.");

  var prior = editId ? S.expenses.filter(function(x){return x.id===editId;})[0] : null;

  if(type==="fund"){
    var fCatSel = document.getElementById("expFundCat").value;
    var fCat = fCatSel==="__new" ? document.getElementById("expFundNewCat").value.trim() : fCatSel;
    if(!fCat) return fail("Pick or type a category.");
    var fexp = { id: editId || ("e"+Date.now()), type:"fund", name:name, budget:amount, category:fCat, active:active };
    var ffound = false;
    S.expenses = S.expenses.map(function(x){ if(x.id===fexp.id){ffound=true; return fexp;} return x; });
    if(!ffound) S.expenses.push(fexp);
    if(S.categories.indexOf(fCat)<0) S.categories.push(fCat);
    persist(); closeModal(); render();
    return;
  }

  var freq = document.getElementById("expFreq").value;
  var catSel = document.getElementById("expCat").value;
  var linkedGoalId = catSel.indexOf("__goal__")===0 ? catSel.slice(8) : undefined;
  var goal = linkedGoalId ? S.savingsGoals.filter(function(g){ return g.id===linkedGoalId; })[0] : null;
  var cat = linkedGoalId ? ("→ "+(goal?goal.name:"Deleted goal")) : (catSel==="__new" ? document.getElementById("expNewCat").value.trim() : catSel);
  var month = parseInt(document.getElementById("expMonth").value,10) || 1;
  var dueDayRaw = parseInt(document.getElementById("expDueDay").value,10);
  var dueDay = (dueDayRaw>=1 && dueDayRaw<=31) ? dueDayRaw : null;
  var dueDay2Raw = freq==="semimonthly" ? parseInt(document.getElementById("expDueDay2").value,10) : NaN;
  var dueDay2 = (dueDay2Raw>=1 && dueDay2Raw<=31) ? dueDay2Raw : null;
  var remindEl = document.getElementById("expRemind");
  var remindOff = remindEl ? remindEl.getAttribute("data-on")!=="1" : true;
  if(!cat) return fail("Pick or type a category.");

  var exp = { id: editId || ("e"+Date.now()), type:type, name:name,
    amount: type==="fixed" ? amount : undefined,
    estimate: type==="variable" ? amount : undefined,
    freq:freq, month: freq==="yearly"?month:undefined, dueDay:dueDay, dueDay2: freq==="semimonthly"?dueDay2:undefined,
    category:cat, active:active, remindOff:remindOff, linkedGoalId:linkedGoalId,
    skipMonths: prior ? prior.skipMonths : undefined };
  var found = false;
  S.expenses = S.expenses.map(function(x){ if(x.id===exp.id){found=true; return exp;} return x; });
  if(!found) S.expenses.push(exp);
  if(!linkedGoalId && S.categories.indexOf(cat)<0) S.categories.push(cat);
  persist(); closeModal(); render();
  if(S.remindersOn) scheduleRemindersDebounced();
}
function expDelete(){
  if(!confirmDel){
    confirmDel = true;
    var btn = document.getElementById("expDel");
    btn.textContent = "Tap again to delete for good";

  var id = editId;
  S.expenses = S.expenses.filter(function(x){return x.id!==id;});

    if(S.months[k].actuals){ delete S.months[k].actuals[id]; delete S.months[k].actuals[id+":2"]; }
  });
  persist(); closeModal(); render();
  if(S.remindersOn) scheduleRemindersDebounced();
}

/* ---------- bill due-date reminders (local notifications, native only) ---------- */
function nativeNotifReady(){
  try{
    return !!(window.Capacitor && typeof window.Capacitor.isNativePlatform === "function"
      && window.Capacitor.isNativePlatform()
      && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications);

// Small stable hash so each (bill, year, month) pair always maps to the same notification id.
function hashId(str){
  var h = 0;
  for(var i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) | 0; }
  return Math.abs(h) % 2000000000;
}
var remindTimer = null;
function scheduleRemindersDebounced(){
  if(remindTimer) clearTimeout(remindTimer);
  remindTimer = setTimeout(rescheduleReminders, 600);
}
function rescheduleReminders(){
  if(!nativeNotifReady()) return;
  var LN = window.Capacitor.Plugins.LocalNotifications;
  LN.getPending().then(function(res){
    var ids = (res.notifications||[]).map(function(n){ return { id:n.id }; });
    return ids.length ? LN.cancel({ notifications: ids }) : Promise.resolve();
  }).then(function(){
    if(!S.remindersOn) return;
    var toSchedule = [];
    var now = new Date();
    var startY = now.getFullYear(), startM = now.getMonth()+1;
    for(var i=0;i<3;i++){
      var m = startM + i, y = startY;
      while(m>12){ m-=12; y++; }
      var data = monthDataAt(y,m);
      billsList().forEach(function(b){
        if(!b.active) return;
        if(b.remindOff) return; // muted individually in Settings → Reminders
        if(!dueInMonth(b,m)) return;
        if(isSkipped(b,y,m)) return;
        var occurrences = b.freq==="semimonthly" ? [[1,b.dueDay],[2,b.dueDay2]] : [[1,b.dueDay]];
        occurrences.forEach(function(pair){
          var occ = pair[0], day = pair[1];
          if(!day) return;
          if(billLeftAt(y,m,b.id,occ) === 0) return; // already paid, skip
          var actualDay = Math.min(day, new Date(y,m,0).getDate());
          var due = new Date(y, m-1, actualDay, 9, 0, 0);
          var fireAt = new Date(due.getTime() - (num(S.remindDays)*24*60*60*1000));
          if(fireAt.getTime() <= now.getTime()) return; // don't schedule for the past
          toSchedule.push({
            id: hashId(b.id+"-"+y+"-"+m+"-"+occ),
            title: b.name + " due soon",
            body: usd(fullAmountFor(b,data,occ)) + " due " + MS[m-1] + " " + actualDay,
            schedule: { at: fireAt },
            actionTypeId: "BILL_REMINDER",
            extra: { billId: b.id, y:y, m:m, occ:occ }
          });
        });
      });
    }
    if(toSchedule.length) return LN.schedule({ notifications: toSchedule });
  }).catch(function(){ /* best effort; a failed schedule pass isn't worth surfacing */ });
}
function setRemindersOn(on){
  if(!nativeNotifReady()){
    if(on){ S.remindersOn = false; render(); }
    return;
  }
  var LN = window.Capacitor.Plugins.LocalNotifications;
  if(!on){
    S.remindersOn = false; persist(); render(); rescheduleReminders();
    return;
  }
  LN.checkPermissions().then(function(res){
    if(res && res.display === "granted") return { display:"granted" };
    return LN.requestPermissions();
  }).then(function(res){
    if(res && res.display === "granted"){
      S.remindersOn = true; persist(); render(); rescheduleReminders();
    } else {
      S.remindersOn = false; persist(); render();
    }
  }).catch(function(){
    S.remindersOn = false; persist(); render();
  });
}
// Marks one bill fully paid for a specific month/year — used by the notification's
// "Mark paid" button, which targets the exact month the reminder was about rather
// than whatever month happens to be on screen when it's tapped.
function markBillPaidAt(billId, y, m, occ){
  var k = mk(y,m);
  if(!S.months[k]) S.months[k] = emptyMonth();
  if(!S.months[k].left) S.months[k].left = {};
  if(!S.months[k].cards) S.months[k].cards = [0,0,0];
  S.months[k].left[leftKey(billId, occ||1)] = 0;
  persist();
  if(view.y===y && view.m===m) render();
  if(S.remindersOn) scheduleRemindersDebounced();

/* ---------- hardware / gesture back button (native only) ---------- *
 * Capacitor routes both the physical back button AND Android's edge-swipe
 * back gesture through the same @capacitor/app "backButton" event. Once you
 * listen for it, you own the behavior entirely — the platform's own default
 * (web-history-back, else exit) no longer runs. So this handler has to
 * explicitly replicate "close whatever's on top" for every layer the app
 * can have open, and fall back to exiting only when nothing is open:
 *   1. A modal/sheet (any form, the ⋯ menus, the month picker) — close it.
 *   2. A Settings detail screen — return to the Settings list.
 *   3. Otherwise — nothing left to close, so exit the app (the platform's
 *      original default when there's no web history to go back through). */
function nativeAppReady(){
  try{
    return !!(window.Capacitor && typeof window.Capacitor.isNativePlatform === "function"
      && window.Capacitor.isNativePlatform()
      && window.Capacitor.Plugins && window.Capacitor.Plugins.App);
  }catch(e){ return false; }
}
function isModalOpen(){
  var el = document.getElementById("modalRoot");
  return !!(el && el.innerHTML.trim().length);
}
function handleHardwareBack(){
  if(isModalOpen()){ closeModal(); return; }
  if(settingsSubScreen){ closeSettingsSection(); return; }
  if(toolsSubScreen){ closeToolsSection(); return; }
  try{ window.Capacitor.Plugins.App.exitApp(); }catch(e){ /* best effort */ }
}
function initHardwareBack(){
  if(!nativeAppReady()) return;
  try{
    window.Capacitor.Plugins.App.addListener("backButton", function(){
      try{ handleHardwareBack(); }catch(e){ /* ignore */ }
    });
  }catch(e){ /* back-button handling is a nice-to-have; ignore failures */ }
}

var BACKUP_NAME_KEY = "billfold:lastBackupName";
function backupBaseName(){
  try{ var v = localStorage.getItem(BACKUP_NAME_KEY); if(v) return v; }catch(e){}
  return "billfold-backup";
}
// Strip characters that aren't safe in a filename on Android/Files/Drive, and fall back
// to the default if the user clears the field entirely.
function sanitizeFilename(name){
  var base = String(name==null?"":name).trim().replace(/[\\/:*?"<>|]/g,"-").replace(/\s+/g," ");
  base = base.replace(/\.txt$/i,"");
  return base || "billfold-backup";
}
function exDownload(){
  var json = JSON.stringify(S, null, 2);
  var inp = document.getElementById("exFname");
  var base = sanitizeFilename(inp ? inp.value : backupBaseName());
  if(inp) inp.value = base;
  try{ localStorage.setItem(BACKUP_NAME_KEY, base); }catch(e){}
  var fname = base + ".txt";

  // Native app: write a real file, then open the system "save / share" sheet.
  if(nativeFileReady()){
    var P = window.Capacitor.Plugins;
    P.Filesystem.writeFile({ path: fname, data: json, directory: "CACHE", encoding: "utf8" })
      .then(function(){ return P.Filesystem.getUri({ directory: "CACHE", path: fname }); })
      .then(function(res){
        return P.Share.share({
          title: "Billfold backup",
          text: "Billfold data backup",
          url: res.uri,
          dialogTitle: "Save your Billfold backup"
        });
      })
      .then(function(){ exMsg("Pick where to save it — Files, Drive, email, etc.", true); })
      .catch(function(e){
        if(e && (e.message === "Share canceled" || (""+e).indexOf("cancel") >= 0)) return;
        exMsg("Couldn't open the save sheet — use “Copy as text” below instead.", false);
      });
    return;
  }

  // Browser / PWA fallback: download via a blob link.
  try{
    var blob = new Blob([json], {type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
    exMsg("Saved to your downloads. Keep it somewhere safe like Drive.", true);
  }catch(e){
    exMsg("Save was blocked here — use “Copy as text” instead.", false);
  }
}
function exCopy(){
  var ta = document.getElementById("exText");
  var done = function(){ exMsg("Copied. Paste it anywhere safe — a OneDrive note or file works well.", true); };
  var manual = function(){ ta.focus(); ta.select(); exMsg("Select the text below and copy it manually.", false); };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(ta.value).then(done, manual);
  } else manual();
}

    + '<label class="filelabel btn btn-ink">Open backup file<input type="file" accept="*/*" onchange="imFile(this)"></label>'
    + '<textarea id="imText" class="code" placeholder=\'Or paste the backup text here ({"version":1, ...})\'></textarea>'
    + '<p id="imErr" class="msg-err" style="display:none"></p>'
    + '<button class="btn btn-ghost" style="width:100%;margin-top:.75rem" onclick="imPaste()">Restore from pasted text</button>');

function imApply(raw){
  try{
    var data = JSON.parse(raw);
    var looksOld = data && Object.prototype.toString.call(data.bills)==="[object Array]";
    var looksNew = data && Object.prototype.toString.call(data.expenses)==="[object Array]";
    if(!data || !(looksOld || looksNew)) throw new Error("shape");
    if((data.lastSaved || 0) < (S.lastSaved || 0)){
      if(!window.confirm("This backup is OLDER than the data already on this device. Replace anyway?")) return;
    }
    var base = seedState();
    delete base.expenses; // seedState()'s placeholder [] would otherwise block migrateExpenses() below from converting an old backup's bills/funds
    Object.keys(data).forEach(function(k){ base[k] = data[k]; });
    S = base;
    activeSavingsGoalId = null;
    savingsFilterGoal = null;
    migrateSavingsGoals();
    migrateOneTimeExpenses();
    migrateExpenses();
    migrateJournalEntries();
    persist(); closeModal(); render();
  }catch(e){
    var el = document.getElementById("imErr");
    el.textContent = "That doesn't look like a Billfold backup. Check the file and try again.";
    el.style.display = "block";
  }
}
function imFile(input){
  var f = input.files && input.files[0];
  if(!f) return;
  var r = new FileReader();
  r.onload = function(){ imApply(String(r.result)); };
  r.readAsText(f);
}
function imPaste(){ imApply(document.getElementById("imText").value); }

/* ================================================================
   APP LOCK — a local PIN gate. Everything here is device-only:
   the PIN (as a salted hash, never the PIN itself) lives in its own
   localStorage key, separate from your budget data, so it's never
   included in a backup file and never leaves this device.
   ================================================================ */
var LOCK_KEY = "billfold:lock";
var lockState = loadLockState();
var lockUnlocked = false;

function loadLockState(){
  try{
    var raw = localStorage.getItem(LOCK_KEY);
    if(raw){ var d = JSON.parse(raw); if(d && d.hash) return d; }
  }catch(e){ /* ignore */ }
  return { hash:null, salt:null, len:null };
}
function persistLockState(){
  try{ localStorage.setItem(LOCK_KEY, JSON.stringify(lockState)); }catch(e){ /* best effort */ }
}
function lockIsSet(){ return !!(lockState && lockState.hash); }
function randomSalt(){
  var bytes = new Uint8Array(16);
  if(window.crypto && window.crypto.getRandomValues) window.crypto.getRandomValues(bytes);
  else for(var i=0;i<bytes.length;i++) bytes[i] = Math.floor(Math.random()*256);
  var s = "";
  for(var j=0;j<bytes.length;j++) s += bytes[j].toString(16).padStart(2,"0");
  return s;
}
// Subtle-crypto SHA-256 when available (native app / any secure context).
function sha256Hex(text){
  if(window.crypto && window.crypto.subtle && window.isSecureContext){
    var enc = new TextEncoder().encode(text);
    return window.crypto.subtle.digest("SHA-256", enc).then(function(buf){
      var arr = Array.from(new Uint8Array(buf));
      return arr.map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
    });
  }
  // Fallback for non-secure contexts (e.g. a plain file:// preview) where
  // SubtleCrypto is unavailable. Not cryptographic, but this is a local
  // deterrent lock, not a security boundary against a determined attacker
  // with access to the device's storage.
  var h1 = 0, h2 = 0;
  for(var i=0;i<text.length;i++){
    var c = text.charCodeAt(i);
    h1 = (Math.imul(h1, 31) + c) | 0;
    h2 = (Math.imul(h2, 131) + c) | 0;
  }
  return Promise.resolve(((h1>>>0).toString(16)) + ((h2>>>0).toString(16)));
}
function hashPin(pin, salt){
  return sha256Hex(salt + ":" + pin);
}
function setPin(pin){
  var salt = randomSalt();
  return hashPin(pin, salt).then(function(hash){
    lockState = { hash:hash, salt:salt, len:pin.length };
    persistLockState();
  });
}
function checkPin(pin){
  if(!lockIsSet()) return Promise.resolve(true);
  return hashPin(pin, lockState.salt).then(function(hash){ return hash === lockState.hash; });
}
function clearPin(){
  lockState = { hash:null, salt:null, len:null };
  persistLockState();
}
function wipeDeviceForReset(){
  try{ localStorage.removeItem(KEY); }catch(e){ /* ignore */ }
  try{ localStorage.removeItem(LOCK_KEY); }catch(e){ /* ignore */ }
  window.location.reload();
}

/* --- Developer options: a second, separate PIN gate, dev-only, never in backups ---
   Default PIN is 192837 — change it from inside Developer options once you're in.
   Stored on-device only, seeded on first boot, independent of the app-lock PIN above. */
var DEV_KEY = "billfold:dev";
var DEV_DEFAULT_PIN = "192837";
var devState = loadDevState();
var devUnlocked = false;
if(!devState){
  var _devSeedSalt = randomSalt();
  hashPin(DEV_DEFAULT_PIN, _devSeedSalt).then(function(h){
    devState = { hash:h, salt:_devSeedSalt };
    persistDevState();
  });
}
function loadDevState(){
  try{
    var raw = localStorage.getItem(DEV_KEY);
    if(raw){ var d = JSON.parse(raw); if(d && d.hash) return d; }
  }catch(e){ /* ignore */ }
  return null;
}
function persistDevState(){
  try{ localStorage.setItem(DEV_KEY, JSON.stringify(devState)); }catch(e){ /* best effort */ }
}
function checkDevPin(pin){
  if(!devState) return Promise.resolve(false); // still seeding — try again in a moment
  return hashPin(pin, devState.salt).then(function(hash){ return hash === devState.hash; });
}
function setDevPin(pin){
  var salt = randomSalt();
  return hashPin(pin, salt).then(function(hash){
    devState = { hash:hash, salt:salt };
    persistDevState();
  });
}
var devForgotArmed = false;
/* Developer options is no longer a visible Settings row — tapping "Last saved" 7 times within
   a couple seconds opens the same PIN prompt as before. This is on top of the PIN, not instead
   of it; it just keeps the entry point from being an obvious, permanently-listed row. */
var devTapCount = 0, devTapTimer = null;
function devSecretTap(){
  devTapCount++;
  if(devTapTimer) clearTimeout(devTapTimer);
  devTapTimer = setTimeout(function(){ devTapCount = 0; }, 2000);
  if(devTapCount >= 5){
    devTapCount = 0;
    openDevPinPrompt();
  }
}
function openDevPinPrompt(){
  modal("Developer options",
    '<p class="muted" style="font-size:.85rem;margin-bottom:.75rem">Enter the developer PIN to continue.</p>'
    + '<input id="devPinInput" class="field" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="••••••" '
    + 'onkeydown="if(event.key===\'Enter\'){event.preventDefault();devPinCheck();}">'
    + '<p id="devPinErr" class="msg-err" style="display:none;margin-top:.5rem"></p>'
    + '<button class="btn btn-pine" style="width:100%;margin-top:1rem" onclick="devPinCheck()">Unlock</button>'
    + '<button id="devForgotBtn" class="btn btn-ghost" style="width:100%;margin-top:.5rem" onclick="devForgotPin()">Forgot PIN? Reset to default</button>'
    + '<p class="muted" style="font-size:.72rem;margin-top:.6rem">This only resets access to Developer options — it doesn\'t touch your bills, funds, or any other data.</p>');
  setTimeout(function(){ var el = document.getElementById("devPinInput"); if(el) el.focus(); }, 50);
}
function devForgotPin(){
  if(!devForgotArmed){
    devForgotArmed = true;
    var btn = document.getElementById("devForgotBtn");
    if(btn) btn.textContent = "Tap again to reset to " + DEV_DEFAULT_PIN;
    setTimeout(function(){ devForgotArmed = false; var b = document.getElementById("devForgotBtn"); if(b) b.textContent = "Forgot PIN? Reset to default"; }, 4000);
    return;
  }
  devForgotArmed = false;
  var salt = randomSalt();
  hashPin(DEV_DEFAULT_PIN, salt).then(function(h){
    devState = { hash:h, salt:salt };
    persistDevState();
    var err = document.getElementById("devPinErr");
    if(err){ err.textContent = "Reset — the developer PIN is now " + DEV_DEFAULT_PIN + "."; err.style.display = "block"; err.className = "msg-ok"; }
    var btn = document.getElementById("devForgotBtn");
    if(btn) btn.textContent = "Forgot PIN? Reset to default";
    var input = document.getElementById("devPinInput");
    if(input) input.value = "";
  });
}
function devPinCheck(){
  var val = (document.getElementById("devPinInput")||{}).value || "";
  checkDevPin(val).then(function(ok){
    if(ok){
      devUnlocked = true;
      if(!S.devOptionsRevealed){ S.devOptionsRevealed = true; persist(); }
      closeModal();
      settingsSubScreen = "dev";
      window.scrollTo(0,0);
      render();
    } else {
      var err = document.getElementById("devPinErr");
      if(err){ err.textContent = "That PIN didn't work."; err.style.display = "block"; }
    }
  });
}

/* --- Web-only invite gate: keeps a shared preview link from being usable by
   anyone who stumbles on it. Has zero effect on the real installed app —
   it only ever runs when Billfold is opened as a plain website. --- */
function isWebOnly(){
  try{ return !(window.Capacitor && typeof window.Capacitor.isNativePlatform === "function" && window.Capacitor.isNativePlatform()); }
  catch(e){ return true; }
}
var INVITE_KEY = "billfold:webInvite";
var INVITE_VERIFIED_KEY = "billfold:webInviteVerified";
// This is the code every new visitor's browser seeds against on their first-ever visit.
// There's no server, so this is the ONLY thing that actually controls who can get in —
// changing it means editing this line and redeploying, not the Developer options button below.
var INVITE_DEFAULT_CODE = "billfoldisawesome";
var inviteState = loadInviteState();
if(isWebOnly() && !inviteState){
  var _inviteSeedSalt = randomSalt();
  hashPin(INVITE_DEFAULT_CODE, _inviteSeedSalt).then(function(h){
    inviteState = { hash:h, salt:_inviteSeedSalt };
    persistInviteState();
  });
}
function loadInviteState(){
  try{
    var raw = localStorage.getItem(INVITE_KEY);
    if(raw){ var d = JSON.parse(raw); if(d && d.hash) return d; }
  }catch(e){ /* ignore */ }
  return null;
}
function persistInviteState(){
  try{ localStorage.setItem(INVITE_KEY, JSON.stringify(inviteState)); }catch(e){ /* best effort */ }
}
function inviteVerified(){
  try{ return localStorage.getItem(INVITE_VERIFIED_KEY) === "1"; }catch(e){ return false; }
}
function markInviteVerified(){
  try{ localStorage.setItem(INVITE_VERIFIED_KEY, "1"); }catch(e){ /* best effort */ }
}
function checkInviteCode(code){
  if(!inviteState) return Promise.resolve(false); // still seeding — try again in a moment
  return hashPin(code, inviteState.salt).then(function(hash){ return hash === inviteState.hash; });
}
function setInviteCode(code){
  var salt = randomSalt();
  return hashPin(code, salt).then(function(hash){
    inviteState = { hash:hash, salt:salt };
    persistInviteState();
  });
}
function inviteGateRender(){
  var root = document.getElementById("lockRoot");
  root.innerHTML =
    '<div style="position:fixed;inset:0;z-index:100;background:var(--paper);display:flex;flex-direction:column;'

    + '<p id="inviteErr" class="msg-err" style="display:none;margin-top:.5rem"></p>'

function inviteCheck(){
  var val = (document.getElementById("inviteInput")||{}).value || "";
  checkInviteCode(val).then(function(ok){

    } else {
      var err = document.getElementById("inviteErr");
      if(err){ err.textContent = "That code didn't work."; err.style.display = "block"; }
    }
  });
}

function devSendTestNotification(){
  if(!nativeNotifReady()){ devMsg("Notifications need the installed app — not available in this preview.", false); return; }
  var LN = window.Capacitor.Plugins.LocalNotifications;
  LN.checkPermissions().then(function(res){
    if(res && res.display === "granted") return { display:"granted" };
    return LN.requestPermissions();
  }).then(function(res){
    if(!(res && res.display === "granted")){ devMsg("Notification permission isn't granted.", false); return; }
    return LN.schedule({ notifications: [{
      id: 999000001,
      title: "Billfold test notification",
      body: "If you can see this, scheduling and permissions are both working.",
      schedule: { at: new Date(Date.now() + 3000) }
    }] });
  }).then(function(){ devMsg("Sent — it should appear in about 3 seconds.", true); })
  .catch(function(e){ devMsg("Couldn't schedule it: " + ((e&&e.message)||e), false); });
}

}
function devRescheduleNow(){
  if(!nativeNotifReady()){ devMsg("Notifications need the installed app — not available in this preview.", false); return; }
  rescheduleReminders();
  devMsg("Reschedule pass ran — tap “Refresh list” below to see the result.", true);
}
function devRefreshPending(){
  var el = document.getElementById("devPendingList");
  if(!el) return;
  if(!nativeNotifReady()){ el.textContent = "Notifications need the installed app — not available in this preview."; return; }
  el.textContent = "Loading…";
  var LN = window.Capacitor.Plugins.LocalNotifications;
  LN.getPending().then(function(res){
    var list = res.notifications || [];
    if(!list.length){ el.textContent = "Nothing scheduled right now."; return; }
    el.innerHTML = '<ul class="plain">' + list.map(function(n){
      var at = (n.schedule && n.schedule.at) ? new Date(n.schedule.at).toLocaleString() : "—";
      return '<li style="padding:.4rem 0;border-top:1px solid var(--line)"><b>'+esc(n.title||"")+'</b><br>'
        + '<span class="muted" style="font-size:.75rem">'+esc(n.body||"")+'<br>Fires: '+esc(at)+' · id '+n.id+'</span></li>';
    }).join("") + '</ul>';
  }).catch(function(){ el.textContent = "Couldn't read the schedule."; });
}
function devDetailCard(){
  return '<button class="btn btn-pine" style="width:100%;margin-bottom:.5rem" onclick="devSendTestNotification()">Send a test notification now</button>'
    + '<button class="btn btn-pine" style="width:100%;margin-bottom:.5rem" onclick="devSendTestBillReminder()">Send a test bill reminder (with actions)</button>'
    + '<button class="btn btn-ghost" style="width:100%" onclick="devRescheduleNow()">Force-reschedule all reminders</button>'
    + '<p id="devMsg" class="msg-ok" style="display:none;margin-top:.6rem"></p>'
    + '<div class="divider"></div>'
    + '<h3 style="font-size:.85rem;font-weight:700;margin-bottom:.5rem">Onboarding</h3>'
    + '<button class="btn btn-ghost" style="width:100%" onclick="devReplayOnboarding()">Replay welcome &amp; setup wizard</button>'
    + '<p class="muted" style="font-size:.72rem;margin-top:.5rem">Runs the real first-launch flow on top of your current data — anything you enter overwrites what\'s already there, same as if you\'d used the fields normally.</p>'
    + '<div class="divider"></div>'
    + '<h3 style="font-size:.85rem;font-weight:700;margin-bottom:.5rem">Sample data</h3>'
    + '<button id="sampleDataBtn" class="btn btn-danger" style="width:100%" onclick="loadSampleData()">Load sample data</button>'
    + '<p class="muted" style="font-size:.72rem;margin-top:.5rem">Erases everything on this device and fills it with example bills, funds, a goal-linked bill, savings goals, and spending — skips the welcome message and setup wizard entirely, so you land straight on Month with something to look at. There\'s no undo.</p>'
    + '<div class="divider"></div>'
    + '<h3 style="font-size:.85rem;font-weight:700;margin-bottom:.5rem">Scheduled reminders</h3>'
    + '<button class="btn btn-ghost" style="width:100%;margin-bottom:.5rem" onclick="devRefreshPending()">Refresh list</button>'
    + '<div id="devPendingList" class="muted" style="font-size:.8rem">Tap “Refresh list” to load what’s currently scheduled.</div>'
    + '<div class="divider"></div>'
    + '<h3 style="font-size:.85rem;font-weight:700;margin-bottom:.5rem">Technical specs</h3>'
    + '<div class="code" style="white-space:pre-wrap;font-size:.75rem;padding:.75rem;height:auto;min-height:0">'+esc(devTechSpecs())+'</div>'
    + '<div class="divider"></div>'
    + '<h3 style="font-size:.85rem;font-weight:700;margin-bottom:.5rem">Developer PIN</h3>'
    + '<button class="btn btn-ghost" style="width:100%" onclick="openChangeDevPin()">Change developer PIN</button>'
    + (isWebOnly()
        ? '<div class="divider"></div>'
          + '<h3 style="font-size:.85rem;font-weight:700;margin-bottom:.5rem">Web invite code</h3>'
          + '<button class="btn btn-ghost" style="width:100%" onclick="openChangeInviteCode()">Change invite code</button>'
        : '');
}

/* --- Settings card: set / change / turn off the PIN --- */
/* ---------- Appearance (light / dark / system) ---------- */
var THEME_KEY = "billfold:theme";
function loadThemeSetting(){
  var v = localStorage.getItem(THEME_KEY);
  return (v==="light" || v==="dark" || v==="system") ? v : "system";
}
function effectiveTheme(setting){
  if(setting==="system"){
    return (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
  }
  return setting;
}
function applyTheme(){
  var eff = effectiveTheme(loadThemeSetting());
  document.documentElement.setAttribute("data-theme", eff);
  var mt = document.querySelector('meta[name="theme-color"]');
  if(mt) mt.setAttribute("content", eff==="dark" ? "#14181A" : "#F5F6F2");
}
function setAppearance(v){
  localStorage.setItem(THEME_KEY, v);
  applyTheme();
  render();
}
function appearanceCard(){
  var setting = loadThemeSetting();
  return '<p class="muted" style="font-size:.85rem;margin-bottom:.9rem">Choose how Billfold looks on this device.</p>'
    + '<div class="seg" style="width:100%">'
    + '<button style="flex:1" class="'+(setting==="light"?"on":"")+'" onclick="setAppearance(\'light\')">Light</button>'
    + '<button style="flex:1" class="'+(setting==="dark"?"on":"")+'" onclick="setAppearance(\'dark\')">Dark</button>'
    + '<button style="flex:1" class="'+(setting==="system"?"on":"")+'" onclick="setAppearance(\'system\')">System</button>'
    + '</div>'
    + '<p class="muted" style="font-size:.75rem;margin-top:.75rem">“System” follows your phone’s own light/dark setting, and switches automatically if that changes while Billfold is open.</p>';
}
function lockCard(){
  var set = lockIsSet();
  var body;
  if(!set){
    body = '<p class="muted" style="font-size:.85rem;margin-bottom:.75rem">Add a PIN to keep this open on your phone from being casually flipped through.</p>'
      + '<button class="btn btn-pine" style="width:100%" onclick="openSetPinForm(false)">Set a PIN</button>';
  } else {
    body = '<p class="muted" style="font-size:.85rem;margin-bottom:.75rem">A PIN is set on this device. You\'ll need it to open Billfold.</p>'
      + '<div class="grid2">'
      + '<button class="btn btn-ghost" onclick="openSetPinForm(true)">Change PIN</button>'
      + '<button class="btn btn-danger" onclick="turnOffPin()">Turn off lock</button>'
      + '</div>';
  }
  return body;
}
function openSetPinForm(isChange){
  modal(isChange ? "Change PIN" : "Set a PIN",
    '<div class="fgroup"><label class="flabel">New PIN (4–6 digits)</label>'
    + '<input id="spPin" class="field" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="••••"></div>'
    + '<div class="fgroup"><label class="flabel">Confirm PIN</label>'
    + '<input id="spPin2" class="field" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="••••"></div>'
    + '<p id="spErr" class="msg-err" style="display:none"></p>'
    + '<button class="btn btn-pine" style="width:100%;margin-top:1rem;padding:.8rem" onclick="spSave()">Save PIN</button>'
    + '<p class="muted" style="font-size:.72rem;margin-top:.6rem">If you forget this PIN, the only way back in is the “Forgot PIN?” reset on the lock screen — which erases everything on this device. Keep a backup (Settings → Back up) if you set a PIN.</p>');
}
function spSave(){
  var p1 = document.getElementById("spPin").value.trim();
  var p2 = document.getElementById("spPin2").value.trim();
  var err = document.getElementById("spErr");
  function fail(m){ err.textContent=m; err.style.display="block"; }
  if(!/^[0-9]{4,6}$/.test(p1)) return fail("Use 4 to 6 digits.");
  if(p1 !== p2) return fail("Those don't match — try again.");
  setPin(p1).then(function(){ closeModal(); render(); });
}
function turnOffPin(){
  clearPin(); render();
}

/* --- Full-screen lock gate shown at boot when a PIN is set --- */
var lockEntry = "";
function lockRender(){
  var root = document.getElementById("lockRoot");
  var dots = "";
  for(var i=0;i<6;i++) dots += '<span style="width:12px;height:12px;border-radius:999px;margin:0 5px;display:inline-block;background:'+(i<lockEntry.length?"var(--pine)":"var(--line)")+'"></span>';
  var keys = "";
  var rows = [["1","2","3"],["4","5","6"],["7","8","9"],["","0","del"]];
  rows.forEach(function(row){
    row.forEach(function(k){
      if(k===""){ keys += '<span></span>'; return; }
      if(k==="del"){
        keys += '<button class="calc-btn fn" onclick="lockBack()">⌫</button>';
      } else {
        keys += '<button class="calc-btn" onclick="lockDigit(\''+k+'\')">'+k+'</button>';
      }
    });
  });
  root.innerHTML =
    '<div style="position:fixed;inset:0;z-index:100;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;padding-top:calc(1.5rem + env(safe-area-inset-top));padding-bottom:calc(1.5rem + env(safe-area-inset-bottom))">'
    + '<div style="color:var(--pine);margin-bottom:.5rem">'+icon("lock",32)+'</div>'
    + '<div class="wordmark" style="margin-bottom:1.5rem"><span class="dot"></span><span class="name">Billfold</span></div>'
    + '<div style="margin-bottom:1.25rem">'+dots+'</div>'
    + '<p id="lockErr" class="msg-err" style="display:none;text-align:center"></p>'
    + '<div class="keys" style="width:100%;max-width:280px;grid-template-columns:repeat(3,1fr)">'+keys+'</div>'
    + '<button class="btn btn-ghost" style="margin-top:1.5rem" onclick="openForgotPin()">Forgot PIN?</button>'
    + '</div>';
}
function lockDigit(d){
  var needLen = lockState.len || 6;
  if(lockEntry.length>=needLen) return;
  lockEntry += d;
  lockRender();
  if(lockEntry.length>=needLen){
    checkPin(lockEntry).then(function(ok){
      if(ok){
        lockUnlocked = true;
        lockEntry = "";
        document.getElementById("lockRoot").innerHTML = "";
        bootApp();
      } else {
        lockEntry = "";
        lockRender();
        var err = document.getElementById("lockErr");
        if(err){ err.textContent = "That PIN didn't work — try again."; err.style.display="block"; }
      }
    });
  }
}
function lockBack(){
  lockEntry = lockEntry.slice(0,-1);
  lockRender();
}
function openForgotPin(){
  modal("Forgot your PIN?",
    '<p style="font-size:.9rem;margin-bottom:.75rem">There\'s no way to recover a PIN — it\'s never stored anywhere, even by Billfold. The only option is to reset the app, which <b>permanently erases every bill, spending entry, and savings record on this device.</b></p>'
    + '<p class="muted" style="font-size:.85rem;margin-bottom:1rem">If you have a backup file, you can restore it after the reset from Settings → Restore.</p>'
    + '<button class="btn btn-danger" style="width:100%" onclick="confirmForgotReset()">Erase this device and remove the PIN</button>'
    + '<button class="btn btn-ghost" style="width:100%;margin-top:.5rem" onclick="closeForgotPin()">Cancel</button>');
}
function closeForgotPin(){
  document.getElementById("modalRoot").innerHTML = "";
}
function confirmForgotReset(){
  if(window.confirm("This erases all Billfold data on this device and cannot be undone. Continue?")){
    wipeDeviceForReset();
  }
}

/* ---------- boot ---------- */
function bootApp(){
  render();
  initAppShortcuts();
  initReminderActions();
  initHardwareBack();
  if(S.remindersOn) rescheduleReminders();
  maybeShowIntro();
}
applyTheme();
if(window.matchMedia){
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function(){
    if(loadThemeSetting()==="system") applyTheme();
  });
}
document.addEventListener("keydown", calcKeydown);
if(isWebOnly() && !inviteVerified()){
  inviteGateRender();
} else if(lockIsSet()){
  lockRender();
} else {
  bootApp();
}
</script>
</body>
</html>
