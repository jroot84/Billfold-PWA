/* ================================================================
   APP LOCK — a local PIN gate. Everything here is device-only:
   the PIN (as a salted hash, never the PIN itself) lives in its own
   localStorage key, separate from your budget data, so it's never
   included in a backup file and never leaves this device.
   ================================================================ */
var LOCK_KEY = "billfold:lock";
var lockState = loadLockState();
var lockUnlocked = false;

function loadLockState(){
  try{
    var raw = localStorage.getItem(LOCK_KEY);
    if(raw){ var d = JSON.parse(raw); if(d && d.hash) return d; }
  }catch(e){ /* ignore */ }
  return { hash:null, salt:null, len:null };
}
function persistLockState(){
  try{ localStorage.setItem(LOCK_KEY, JSON.stringify(lockState)); }catch(e){ /* best effort */ }
}
function lockIsSet(){ return !!(lockState && lockState.hash); }
function randomSalt(){
  var bytes = new Uint8Array(16);
  if(window.crypto && window.crypto.getRandomValues) window.crypto.getRandomValues(bytes);
  else for(var i=0;i<bytes.length;i++) bytes[i] = Math.floor(Math.random()*256);
  var s = "";
  for(var j=0;j<bytes.length;j++) s += bytes[j].toString(16).padStart(2,"0");
  return s;
}
// Subtle-crypto SHA-256 when available (native app / any secure context).
function sha256Hex(text){
  if(window.crypto && window.crypto.subtle && window.isSecureContext){
    var enc = new TextEncoder().encode(text);
    return window.crypto.subtle.digest("SHA-256", enc).then(function(buf){
      var arr = Array.from(new Uint8Array(buf));
      return arr.map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
    });
  }
  // Fallback for non-secure contexts (e.g. a plain file:// preview) where
  // SubtleCrypto is unavailable. Not cryptographic, but this is a local
  // deterrent lock, not a security boundary against a determined attacker
  // with access to the device's storage.
  var h1 = 0, h2 = 0;
  for(var i=0;i<text.length;i++){
    var c = text.charCodeAt(i);
    h1 = (Math.imul(h1, 31) + c) | 0;
    h2 = (Math.imul(h2, 131) + c) | 0;
  }
  return Promise.resolve(((h1>>>0).toString(16)) + ((h2>>>0).toString(16)));
}
function hashPin(pin, salt){
  return sha256Hex(salt + ":" + pin);
}
function setPin(pin){
  var salt = randomSalt();
  return hashPin(pin, salt).then(function(hash){
    lockState = { hash:hash, salt:salt, len:pin.length };
    persistLockState();
  });
}
function checkPin(pin){
  if(!lockIsSet()) return Promise.resolve(true);
  return hashPin(pin, lockState.salt).then(function(hash){ return hash === lockState.hash; });
}
function clearPin(){
  lockState = { hash:null, salt:null, len:null };
  persistLockState();
}
function wipeDeviceForReset(){
  try{ localStorage.removeItem(KEY); }catch(e){ /* ignore */ }
  try{ localStorage.removeItem(LOCK_KEY); }catch(e){ /* ignore */ }
  window.location.reload();
}

  }
  return body;
}
function openSetPinForm(isChange){
  modal(isChange ? "Change PIN" : "Set a PIN",
    '<div class="fgroup"><label class="flabel">New PIN (4–6 digits)</label>'
    + '<input id="spPin" class="field" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="••••"></div>'
    + '<div class="fgroup"><label class="flabel">Confirm PIN</label>'
    + '<input id="spPin2" class="field" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="••••"></div>'
    + '<p id="spErr" class="msg-err" style="display:none"></p>'
    + '<button class="btn btn-pine" style="width:100%;margin-top:1rem;padding:.8rem" onclick="spSave()">Save PIN</button>'
    + '<p class="muted" style="font-size:.72rem;margin-top:.6rem">If you forget this PIN, the only way back in is the “Forgot PIN?” reset on the lock screen — which erases everything on this device. Keep a backup (Settings → Back up) if you set a PIN.</p>');
}
function spSave(){
  var p1 = document.getElementById("spPin").value.trim();
  var p2 = document.getElementById("spPin2").value.trim();
  var err = document.getElementById("spErr");
  function fail(m){ err.textContent=m; err.style.display="block"; }
  if(!/^[0-9]{4,6}$/.test(p1)) return fail("Use 4 to 6 digits.");
  if(p1 !== p2) return fail("Those don't match — try again.");
  setPin(p1).then(function(){ closeModal(); render(); });
}
function turnOffPin(){
  clearPin(); render();
}

/* --- Full-screen lock gate shown at boot when a PIN is set --- */
var lockEntry = "";
function lockRender(){
  var root = document.getElementById("lockRoot");
  var dots = "";
  for(var i=0;i<6;i++) dots += '<span style="width:12px;height:12px;border-radius:999px;margin:0 5px;display:inline-block;background:'+(i<lockEntry.length?"var(--pine)":"var(--line)")+'"></span>';
  var keys = "";
  var rows = [["1","2","3"],["4","5","6"],["7","8","9"],["","0","del"]];
  rows.forEach(function(row){
    row.forEach(function(k){
      if(k===""){ keys += '<span></span>'; return; }
      if(k==="del"){
        keys += '<button class="calc-btn fn" onclick="lockBack()">⌫</button>';
      } else {
        keys += '<button class="calc-btn" onclick="lockDigit(\''+k+'\')">'+k+'</button>';
      }
    });
  });
  root.innerHTML =
    '<div style="position:fixed;inset:0;z-index:100;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;padding-top:calc(1.5rem + env(safe-area-inset-top));padding-bottom:calc(1.5rem + env(safe-area-inset-bottom))">'
    + '<div style="color:var(--pine);margin-bottom:.5rem">'+icon("lock",32)+'</div>'
    + '<div class="wordmark" style="margin-bottom:1.5rem"><span class="dot"></span><span class="name">Billfold</span></div>'
    + '<div style="margin-bottom:1.25rem">'+dots+'</div>'
    + '<p id="lockErr" class="msg-err" style="display:none;text-align:center"></p>'
    + '<div class="keys" style="width:100%;max-width:280px;grid-template-columns:repeat(3,1fr)">'+keys+'</div>'
    + '<button class="btn btn-ghost" style="margin-top:1.5rem" onclick="openForgotPin()">Forgot PIN?</button>'
    + '</div>';
}
function lockDigit(d){
  var needLen = lockState.len || 6;
  if(lockEntry.length>=needLen) return;
  lockEntry += d;
  lockRender();
  if(lockEntry.length>=needLen){
    checkPin(lockEntry).then(function(ok){
      if(ok){
        lockUnlocked = true;
        lockEntry = "";
        document.getElementById("lockRoot").innerHTML = "";
        bootApp();
      } else {
        lockEntry = "";
        lockRender();
        var err = document.getElementById("lockErr");
        if(err){ err.textContent = "That PIN didn't work — try again."; err.style.display="block"; }
      }
    });
  }
}
function lockBack(){
  lockEntry = lockEntry.slice(0,-1);
  lockRender();
}
function openForgotPin(){
  modal("Forgot your PIN?",
    '<p style="font-size:.9rem;margin-bottom:.75rem">There\'s no way to recover a PIN — it\'s never stored anywhere, even by Billfold. The only option is to reset the app, which <b>permanently erases every bill, spending entry, and savings record on this device.</b></p>'
    + '<p class="muted" style="font-size:.85rem;margin-bottom:1rem">If you have a backup file, you can restore it after the reset from Settings → Restore.</p>'
    + '<button class="btn btn-danger" style="width:100%" onclick="confirmForgotReset()">Erase this device and remove the PIN</button>'
    + '<button class="btn btn-ghost" style="width:100%;margin-top:.5rem" onclick="closeForgotPin()">Cancel</button>');
}
function closeForgotPin(){
  document.getElementById("modalRoot").innerHTML = "";
}
function confirmForgotReset(){
  if(window.confirm("This erases all Billfold data on this device and cannot be undone. Continue?")){
    wipeDeviceForReset();
  }
}

/* ---------- boot ---------- */
function bootApp(){
  render();
  initAppShortcuts();
  initReminderActions();
  initHardwareBack();
  if(S.remindersOn) rescheduleReminders();
  maybeShowIntro();
}
applyTheme();
if(window.matchMedia){
  window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function(){
    if(loadThemeSetting()==="system") applyTheme();
  });
}
document.addEventListener("keydown", calcKeydown);
if(isWebOnly() && !inviteVerified()){
  inviteGateRender();
} else if(lockIsSet()){
  lockRender();
} else {
  bootApp();
}
</script>
</body>
</html>
