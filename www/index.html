<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Billfold</title>
<meta name="theme-color" content="#F5F6F2">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231F6F54'/></svg>">
<!-- Web-preview only: lets iOS/Android "Add to Home Screen" behave like an installed app.
     Has no effect on the real Capacitor-wrapped app, which uses its own native icon/splash. -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Billfold">
<link rel="apple-touch-icon" href="icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;700;800&display=swap">
<style>
  :root{
    --paper:#F5F6F2; --card:#FFFFFF; --ink:#1B2A32; --sub:#63727A; --line:#E3E7E0;
    --pine:#1F6F54; --pine-soft:#E4F0E9; --amber:#A8611C; --amber-soft:#F8ECDC;
    --red:#A63D2F; --red-soft:#FBEDEA; --field:#FBFCFA; --track:#C6CEC6;
    --chip:#1B2A32; --chip-fg:#FFFFFF;
  }
  :root[data-theme="dark"]{
    --paper:#14181A; --card:#1E2426; --ink:#ECF0EE; --sub:#8B9A96; --line:#2C3538;
    --pine:#4CAF8C; --pine-soft:#1B3A2E; --amber:#E2A253; --amber-soft:#3A2A15;
    --red:#E2776A; --red-soft:#3A211D; --field:#191F21; --track:#3A4448;
    --chip:#1B3A2E; --chip-fg:#4CAF8C;
  }
  *{ box-sizing:border-box; margin:0; }
  html,body{ height:100%; }
  body{
    background:var(--paper); color:var(--ink);
    font-family:'Schibsted Grotesk', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    font-size:16px; -webkit-font-smoothing:antialiased;
    transition:background-color .15s ease, color .15s ease;
  }
  button{ font-family:inherit; font-size:inherit; color:inherit; background:none; border:none; cursor:pointer; }
  input,select,textarea{ font-family:inherit; font-size:0.9rem; color:var(--ink); }
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
    outline:2px solid var(--pine); outline-offset:2px;
  }
  .tnum{ font-variant-numeric:tabular-nums; }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }

  /* layout */
  header.top{
    position:sticky; top:0; z-index:20; background:var(--paper);
    border-bottom:1px solid var(--line);
    /* keep content clear of the camera cutout / status bar */
    padding-top:env(safe-area-inset-top, 0px);
  }
  .top-inner{ max-width:48rem; margin:0 auto; padding:0 1rem; height:3.5rem;
    display:flex; align-items:center; justify-content:space-between; }
  main{ max-width:48rem; margin:0 auto; padding:1rem 1rem 7.5rem; }
  .wordmark{ display:flex; align-items:center; gap:.5rem; user-select:none; }
  .wordmark .dot{ width:10px; height:10px; border-radius:3px; background:var(--pine); }
  .wordmark .name{ font-weight:800; font-size:1.15rem; letter-spacing:-0.02em; }

  nav.desktop{ display:none; gap:.25rem; }
  nav.desktop button{ padding:.35rem 1rem; border-radius:999px; font-size:.875rem; font-weight:500; color:var(--sub); }
  nav.desktop button.on{ background:var(--chip); color:var(--chip-fg); }

  nav.tabbar{
    position:fixed; bottom:0; left:0; right:0; z-index:20; background:var(--card);
    border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom);
    display:grid; grid-template-columns:repeat(5,1fr);
  }
  .tabbar button{ display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:.45rem 0 .5rem; font-size:.6rem; font-weight:500; color:var(--sub); white-space:nowrap; }
  .tabbar .tabicon{ display:flex; align-items:center; justify-content:center;
    width:52px; height:30px; border-radius:999px; transition:background .15s; }
  .tabbar button.on{ color:var(--pine); font-weight:700; }
  .tabbar button.on .tabicon{ background:var(--pine-soft); }
  .tabbar svg{ width:22px; height:22px; }

  /* calculator */
  .calc-top{ text-align:right; color:var(--sub); font-size:.95rem; min-height:1.2em;
    font-variant-numeric:tabular-nums; }
  .calc-display{ text-align:right; font-weight:800; font-size:2.1rem; letter-spacing:-0.02em;
    font-variant-numeric:tabular-nums; overflow:hidden; white-space:nowrap; line-height:1.2; }
  .calc-hist{ display:flex; flex-wrap:wrap; gap:.4rem; margin-bottom:1rem; }
  .calc-chip{ border:1px solid var(--line); background:var(--card); border-radius:999px;
    padding:.3rem .65rem; font-size:.72rem; color:var(--sub); }
  .calc-chip b{ color:var(--ink); }
  .calc-chip.on{ background:var(--chip); color:var(--chip-fg); border-color:var(--chip); }
  .keys{ display:grid; grid-template-columns:repeat(4,1fr); gap:.5rem; }
  .calc-btn{ height:58px; border-radius:1rem; font-size:1.35rem; font-weight:600;
    background:var(--field); border:1px solid var(--line); color:var(--ink); }
  .calc-btn.op{ background:var(--pine-soft); border-color:var(--pine-soft); color:var(--pine); font-weight:700; }
  .calc-btn.fn{ background:var(--paper); color:var(--sub); font-size:1.15rem; }
  .calc-btn.eq{ background:var(--pine); border-color:var(--pine); color:#fff; }
  .calc-btn:active{ filter:brightness(0.95); }
  .calcbtn{ flex:none; display:flex; align-items:center; justify-content:center;
    width:28px; height:28px; margin-left:1px; border-radius:8px; color:var(--sub); background:transparent; }
  .calcbtn:active{ background:var(--line); }

  @media (min-width:768px){
    nav.desktop{ display:flex; flex:1; justify-content:center; }
    nav.tabbar{ display:none; }
    main{ padding-bottom:3rem; }
  }

  /* components */
  .card{ background:var(--card); border:1px solid var(--line); border-radius:1rem; margin-bottom:1rem;
    transition:background-color .15s ease, border-color .15s ease; }
  .pad{ padding:1rem; }
  .eyebrow{ font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--sub); margin-bottom:.75rem; }
  .row{ display:flex; align-items:center; justify-content:space-between; gap:.75rem; }
  .row + .row{ margin-top:.65rem; }
  .row .lbl{ font-size:.9rem; }
  .muted{ color:var(--sub); }
  .divider{ border-top:1px solid var(--line); margin:.85rem 0; }

  .money{ display:flex; align-items:center; width:146px; border:1px solid var(--line);
    border-radius:.5rem; background:var(--field); padding:0 .25rem 0 .5rem; }
  .money span{ color:var(--sub); font-size:.85rem; }
  .money input{ flex:1; min-width:0; width:100%; border:none; background:transparent; text-align:right;
    padding:.4rem .15rem .4rem .25rem; font-weight:600; font-size:.875rem; }
  .money input:focus{ outline:none; }

  .btn{ display:flex; align-items:center; justify-content:center; gap:.4rem;
    padding:.65rem 1rem; border-radius:.75rem; font-weight:600; font-size:.875rem; }
  .btn-ink{ background:var(--ink); color:#fff; }
  /* In dark mode --ink flips to a near-white text color, which would make .btn-ink buttons
     (Back up, Save, Save/Open backup file) render as a near-invisible white-on-white button.
     Give them the same solid pine treatment as the primary .btn-pine buttons (e.g. "+ Add bill")
     in dark mode specifically; light mode is unaffected. */
  :root[data-theme="dark"] .btn-ink{ background:var(--pine); }
  .btn-pine{ background:var(--pine); color:#fff; }
  .btn-ghost{ border:1px solid var(--line); }
  .btn-danger{ border:1px solid var(--line); color:var(--red); }
  .btn-danger.armed{ border-color:var(--red); background:var(--red-soft); }
  .btn[disabled]{ opacity:.4; cursor:default; }
  .btn-round{ padding:.5rem; border:1px solid var(--line); border-radius:999px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:.5rem; }
  /* Two .fgroup's placed side-by-side as grid2 columns are still adjacent DOM siblings, so
     without this override the vertical-stacking rule below pushes the second column down
     within its own cell, throwing the two columns out of alignment with each other. */
  .grid2 > .fgroup + .fgroup{ margin-top:0; }

  .field{ width:100%; border:1px solid var(--line); background:var(--field);
    border-radius:.75rem; padding:.6rem .75rem; font-weight:500; }
  label.flabel{ display:block; font-size:.875rem; font-weight:500; margin:0 0 .35rem; }
  .fgroup + .fgroup{ margin-top:.9rem; }

  /* month dial */
  .dial{ display:flex; align-items:center; justify-content:space-between; }
  .dial .title{ font-weight:800; font-size:1.5rem; letter-spacing:-0.02em; }
  .dial .subtitle{ font-size:.8rem; color:var(--sub); }
  .track{ height:6px; border-radius:999px; background:var(--line); overflow:hidden; margin-top:1rem; }
  .track .fill{ height:100%; border-radius:999px; background:var(--pine); transition:width .25s; }
  .track-caption{ display:flex; justify-content:space-between; font-size:.75rem; color:var(--sub); margin-top:.4rem; }

  .hero{ margin-top:.85rem; border-radius:.85rem; padding:.9rem 1rem; display:flex;
    align-items:baseline; justify-content:space-between; }
  .hero .amt{ font-weight:800; font-size:1.75rem; letter-spacing:-0.02em; }

  /* bill list */
  .bill-li{ display:flex; align-items:center; gap:.75rem; padding:.75rem 1rem; }
  .bill-li + .bill-li, li + li > .bill-li, ul.plain li + li{ border-top:1px solid var(--line); }
  ul.plain{ list-style:none; padding:0; }
  .checkbtn{ flex:none; width:26px; height:26px; border-radius:999px; border:2px solid var(--track);
    display:flex; align-items:center; justify-content:center; color:#fff; transition:background .15s,border-color .15s; }
  .checkbtn.paid{ background:var(--pine); border-color:var(--pine); }
  .bill-main{ flex:1; display:flex; align-items:center; justify-content:space-between; text-align:left; padding:0; }
  .bill-name{ font-weight:600; font-size:.9rem; }
  .bill-name.done{ text-decoration:line-through; color:var(--sub); }
  .bill-cat{ font-size:.75rem; color:var(--sub); display:flex; align-items:center; gap:.35rem; }
  .cat-dot{ width:7px; height:7px; border-radius:999px; display:inline-block; flex:none; }
  .bill-amt{ text-align:right; }
  .bill-amt .due{ font-weight:700; font-size:.9rem; }
  .bill-amt .status{ font-size:.75rem; font-weight:600; }
  .list-head{ padding:1rem 1rem .5rem; display:flex; align-items:baseline; justify-content:space-between; }

  /* segmented control */
  .settings-icon{ flex:none; width:34px; height:34px; border-radius:999px; background:var(--pine-soft); color:var(--pine);
    display:flex; align-items:center; justify-content:center; }
  .settings-back{ flex:none; width:36px; height:36px; }
  .seg{ display:flex; flex-wrap:wrap; justify-content:center; border:1px solid var(--line); background:var(--card); border-radius:999px;
    padding:.25rem; width:fit-content; max-width:100%; margin:0 auto 1rem; }
  .seg button{ padding:.35rem 1rem; border-radius:999px; font-size:.875rem; font-weight:600; color:var(--sub); }
  .seg button.on{ background:var(--chip); color:var(--chip-fg); }

  /* donut */
  .donut-wrap{ position:relative; width:210px; height:210px; margin:0 auto .75rem; }
  .donut{ width:100%; height:100%; border-radius:50%; }
  .donut-hole{ position:absolute; inset:32px; border-radius:50%; background:var(--card);
    display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .donut-hole .amt{ font-weight:800; font-size:1.5rem; letter-spacing:-0.02em; }
  .donut-hole .cap{ font-size:.75rem; color:var(--sub); }
  .cat-bar{ height:4px; border-radius:999px; background:var(--line); overflow:hidden; margin-top:.3rem; }
  .cat-bar .fill{ height:100%; border-radius:999px; }
  .report-li + .report-li{ margin-top:.7rem; }

  /* modal */
  .overlay{ position:fixed; inset:0; z-index:50; background:rgba(20,30,35,.45);
    display:flex; align-items:flex-end; justify-content:center; }
  .sheet{ width:100%; max-height:90vh; overflow-y:auto; background:var(--card);
    border-radius:1rem 1rem 0 0; padding:1.25rem;
    /* clear a 3-button Android nav bar the same way the header clears the notch */
    padding-bottom:calc(1.25rem + env(safe-area-inset-bottom, 0px)); }
  @media (min-width:640px){
    .overlay{ align-items:center; }
    .sheet{ max-width:28rem; border-radius:1rem; }
  }
  .sheet-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
  .sheet-head h2{ font-size:1.1rem; font-weight:700; }

  .month-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:.5rem; }
  .month-grid button{ padding:.65rem 0; border-radius:.75rem; border:1px solid var(--line);
    font-weight:600; font-size:.875rem; }
  .month-grid button.on{ background:var(--chip); color:var(--chip-fg); border-color:var(--chip); }

  .toggle{ width:40px; height:22px; border-radius:999px; background:var(--track); padding:2px;
    display:flex; align-items:center; justify-content:flex-start; transition:background .15s; flex:none; }
  .toggle.on{ background:var(--pine); justify-content:flex-end; }
  .toggle .knob{ width:18px; height:18px; border-radius:999px; background:#fff; }

  .note-box{ margin-top:.75rem; font-size:.75rem; color:var(--sub); background:var(--paper);
    border-radius:.5rem; padding:.6rem .7rem; }
  details{ border-top:1px solid var(--line); }
  details:first-of-type{ border-top:none; }
  details summary{ cursor:pointer; font-weight:600; font-size:.875rem; padding:.65rem 0;
    list-style:none; display:flex; align-items:center; justify-content:space-between; }
  details summary::-webkit-details-marker{ display:none; }
  details summary::after{ content:"+"; color:var(--sub); font-weight:400; font-size:1.1rem; padding-left:.5rem; }
  details[open] summary::after{ content:"\2212"; }
  details .body{ font-size:.85rem; color:var(--sub); line-height:1.55; padding:0 0 .9rem; }
  details .body b{ color:var(--ink); }
  .banner{ max-width:48rem; margin:0 auto; padding:.6rem 1rem; font-size:.8rem; font-weight:500;
    color:var(--amber); background:var(--amber-soft); border-radius:0 0 .75rem .75rem; }
  .msg-ok{ color:var(--pine); font-size:.875rem; font-weight:500; margin:.5rem 0; }
  .msg-err{ color:var(--red); font-size:.875rem; font-weight:500; margin:.5rem 0; }
  textarea.code{ width:100%; min-height:130px; border:1px solid var(--line); background:var(--field);
    border-radius:.75rem; padding:.75rem; font-family:ui-monospace, Menlo, Consolas, monospace; font-size:.72rem; }
  .filelabel{ display:block; text-align:center; margin-bottom:.75rem; }
  .filelabel input{ display:none; }
  .hidden{ display:none; }
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="wordmark"><span class="dot"></span><span class="name">Billfold</span></div>
    <nav class="desktop" id="desktopNav"></nav>
  </div>
  <div id="banner"></div>
</header>

<main id="main"></main>

<nav class="tabbar" id="tabbar"></nav>
<div id="modalRoot"></div>
<div id="calcModalRoot"></div>
<div id="lockRoot"></div>

<script>
"use strict";
/* ================================================================
   BILLFOLD — standalone edition. One file, no internet required.
   Data auto-saves to this browser's local storage on this device.
   Cloud copy: Data tab -> Back up -> put the file in OneDrive.
   ================================================================ */

var KEY = "billfold:v1";
var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
var MS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var CHART_COLORS = ["#1F6F54","#3E7CB1","#C77B30","#7A5AA6","#B2456E","#5C8A3A","#8A6D3B","#4A6670","#9C4DCC","#2E8B8B"];

/* ---------- icons (inline SVG) ---------- */
function icon(name, size){
  var s = size || 20;
  var paths = {
    calendar: '<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>',
    list: '<path d="M3 6h1M3 12h1M3 18h1M8 6h13M8 12h13M8 18h13"/>',
    pie: '<path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/>',
    db: '<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/>',
    settings: '<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82A1.65 1.65 0 0 0 3 14.09H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>',
    left: '<path d="M15 18l-6-6 6-6"/>',
    right: '<path d="M9 18l6-6-6-6"/>',
    check: '<path d="M20 6L9 17l-5-5"/>',
    x: '<path d="M18 6L6 18M6 6l12 12"/>',
    down: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>',
    up: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>',
    copy: '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
    reset: '<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>',
    trend: '<path d="M23 6l-9.5 9.5-5-5L1 18"/><path d="M17 6h6v6"/>',
    calc: '<rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8"/><path d="M8 10h.01M12 10h.01M16 10h.01M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01M16 18h.01"/>',
    journal: '<path d="M5 3h12l4 4v14H5z"/><path d="M17 3v4h4"/><path d="M9 10h7M9 14h7M9 18h4"/>',
    toolbox: '<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M2 13h20"/><path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/>',
    lock: '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
    help: '<circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 1 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/>',
    info: '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>',
    theme: '<circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20z" fill="currentColor" stroke="none"/>',
    search: '<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
    more: '<circle cx="5" cy="12" r="1.6" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/><circle cx="19" cy="12" r="1.6" fill="currentColor" stroke="none"/>',
    sort: '<path d="M3 7h11M3 12h7M3 17h4"/><path d="M17 5v14M17 5l-3.5 3.5M17 5l3.5 3.5"/>',
    filter: '<path d="M4 5h16l-6 8v6l-4-2v-4z"/>'
  };
  return '<svg viewBox="0 0 24 24" width="'+s+'" height="'+s+'" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+paths[name]+'</svg>';
}

/* ---------- helpers ---------- */
function num(v){ var n = parseFloat(v); return isFinite(n) ? n : 0; }
function usd(n){
  var v = num(n);
  return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",
    minimumFractionDigits: Number.isInteger(v)?0:2, maximumFractionDigits:2}).format(v);
}
function mk(y,m){ return y+"-"+m; }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function dueInMonth(b,m){
  if(!b.active) return false;
  if(b.freq==="monthly") return true;
  if(b.freq==="even") return m%2===0;
  if(b.freq==="odd") return m%2===1;
  if(b.freq==="yearly") return (b.month||1)===m;
  return true;
}
function monthlyEq(b){
  var a = num(b.amount);
  if(b.freq==="even"||b.freq==="odd") return a/2;
  if(b.freq==="yearly") return a/12;
  return a;
}
function freqText(b){
  if(b.freq==="yearly") return "Every "+MS[(b.month||1)-1];
  return {monthly:"Monthly",even:"Even months",odd:"Odd months"}[b.freq]||"Monthly";
}
function catColor(cat){
  var i = S.categories.indexOf(cat);
  return CHART_COLORS[(i<0?0:i)%CHART_COLORS.length];
}

/* ---------- seed data (from the original spreadsheet) ---------- */
function seedState(){
  // Fresh install starts completely empty.
  return {

function loadState(){
  try{
    var raw = localStorage.getItem(KEY);
    if(raw){ var d = JSON.parse(raw); if(d && d.bills) return d; }
  }catch(e){ storageOK = false; }
  return null;
}
var saveTimer = null;
function persist(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    S.lastSaved = Date.now();
    try{ localStorage.setItem(KEY, JSON.stringify(S)); storageOK = true; }
    catch(e){ storageOK = false; renderBanner(); }
  }, 400);
}

/* ---------- derived ---------- */
function emptyMonth(){ return {balance:0,cards:[0,0,0],oneTime:0,left:{}}; }
function md(){ return S.months[mk(view.y,view.m)] || emptyMonth(); }
function leftOf(b, data){
  var d = data || md();
  var v = d.left ? d.left[b.id] : undefined;
  return (v===undefined||v===null) ? num(b.amount) : num(v);
}
function dueBills(){ return S.bills.filter(function(b){ return dueInMonth(b, view.m); }); }
function restOfYear(){
  var sum = 0;
  for(var m=view.m+1; m<=12; m++){
    var data = S.months[mk(view.y,m)] || emptyMonth();
    S.bills.forEach(function(b){ if(dueInMonth(b,m)) sum += leftOf(b,data); });
  }
  return sum;
}

/* ---------- mutations ---------- */
function touchMonth(){
  var k = mk(view.y,view.m);
  if(!S.months[k]) S.months[k] = emptyMonth();
  if(!S.months[k].left) S.months[k].left = {};
  if(!S.months[k].cards) S.months[k].cards = [0,0,0];
  return S.months[k];
}
function patchMonthField(field, val){ touchMonth()[field] = num(val); persist(); render(); }
function patchCard(i, val){ touchMonth().cards[i] = num(val); persist(); render(); }
function setLeft(billId, val){
  var m = touchMonth();
  if(val===undefined) delete m.left[billId]; else m.left[billId] = val;
  persist(); render();
  if(S.remindersOn) scheduleRemindersDebounced();
}
function togglePaid(billId){
  var b = S.bills.filter(function(x){return x.id===billId;})[0];
  if(!b) return;
  if(leftOf(b)===0) setLeft(billId, undefined); else setLeft(billId, 0);
}
function step(d){
  var m = view.m + d, y = view.y;
  if(m>12){ m=1; y++; } if(m<1){ m=12; y--; }
  view.m = m; view.y = y; render();
}
function go(screen){ if(screen==="data") settingsSubScreen = null; if(screen==="reports") toolsSubScreen = null; view.screen = screen; window.scrollTo(0,0); render(); }

}

/* ---------- Month screen ---------- */
function monthScreen(){
  var data = md(), bills = dueBills();
  var totalDue=0, stillDue=0, paidCount=0;
  bills.forEach(function(b){
    var l = leftOf(b,data);
    totalDue += num(b.amount); stillDue += l;
    if(l===0) paidCount++;
  });
  var cardsTotal = (data.cards||[]).reduce(function(s,c){return s+num(c);},0);
  var afterAll = num(data.balance) - cardsTotal - num(data.oneTime) - stillDue;
  var pct = totalDue>0 ? Math.round((totalDue-stillDue)/totalDue*100) : 100;
  var roy = restOfYear();

  var h = '<section class="card pad">'
    + '<div class="dial">'
    + '<button class="btn-round" aria-label="Previous month" onclick="step(-1)">'+icon("left",20)+'</button>'
    + '<button onclick="openPicker()" style="text-align:center;padding:.25rem 1rem;">'
    +   '<div class="title">'+MONTHS[view.m-1]+'</div><div class="subtitle">'+view.y+' · tap to jump</div></button>'
    + '<button class="btn-round" aria-label="Next month" onclick="step(1)">'+icon("right",20)+'</button>'
    + '</div>'
    + '<div class="track"><div class="fill" style="width:'+pct+'%"></div></div>'
    + '<div class="track-caption"><span>'+paidCount+' of '+bills.length+' bills paid</span>'
    + '<span class="tnum">'+usd(totalDue-stillDue)+' of '+usd(totalDue)+'</span></div>'
    + '</section>';

  h += '<section class="card pad"><h2 class="eyebrow">My money</h2>'
    + moneyRow("Available now (your balance)", data.balance, "patchMonthField('balance', this.value)")
    + S.cardNames.map(function(cn,i){ return moneyRow(esc(cn), (data.cards||[])[i], "patchCard("+i+", this.value)"); }).join("")
    + moneyRow("One-time expenses", data.oneTime, "patchMonthField('oneTime', this.value)")
    + '<div class="divider"></div>'
    + '<div class="row"><span class="lbl">Still due this month</span>'
    + '<span class="tnum" style="font-weight:700;color:'+(stillDue>0?"var(--amber)":"var(--pine)")+'">'+usd(stillDue)+'</span></div>'
    + '<div class="hero" style="background:'+(afterAll>=0?"var(--pine-soft)":"var(--amber-soft)")+'">'
    + '<span style="font-weight:600;font-size:.9rem">After bills + cards</span>'
    + '<span class="amt tnum" style="color:'+(afterAll>=0?"var(--pine)":"var(--red)")+'">'+usd(afterAll)+'</span></div>'
    + '<div class="row" style="margin-top:.6rem"><span class="muted" style="font-size:.75rem">Rest of '+view.y+' — left to fund</span>'
    + '<span class="tnum muted" style="font-size:.75rem;font-weight:600">'+usd(roy)+'</span></div>'
    + (cardsTotal+num(data.oneTime)>0
        ? '<div class="muted" style="font-size:.75rem;margin-top:.25rem">Includes '+usd(cardsTotal)+' on cards'+(num(data.oneTime)>0?' and '+usd(data.oneTime)+' one-time':'')+'.</div>'
        : '')
    + '</section>';

  h += '<section class="card"><div class="list-head"><h2 class="eyebrow" style="margin:0">Bills due in '+MS[view.m-1]+'</h2>'
    + '<span class="muted" style="font-size:.75rem">tap a bill to update</span></div>';
  if(bills.length===0){
    h += '<p class="muted" style="padding:0 1rem 1rem;font-size:.9rem">No bills scheduled this month. Add one from the Bills tab.</p>';
  }
  h += '<ul class="plain">' + bills.map(function(b){
    var l = leftOf(b,data), paid = l===0, partial = !paid && l<num(b.amount);
    return '<li><div class="bill-li">'
      + '<button class="checkbtn'+(paid?" paid":"")+'" aria-label="'+(paid?"Mark unpaid":"Mark paid")+'" onclick="togglePaid(\''+b.id+'\')">'+(paid?icon("check",15):"")+'</button>'
      + '<button class="bill-main" onclick="openPay(\''+b.id+'\')">'
      + '<div><div class="bill-name'+(paid?" done":"")+'">'+esc(b.name)+'</div>'
      + '<div class="bill-cat"><span class="cat-dot" style="background:'+catColor(b.category)+'"></span>'+esc(b.category)+'</div></div>'
      + '<div class="bill-amt"><div class="due tnum">'+usd(b.amount)+'</div>'
      + '<div class="status tnum" style="color:'+(paid?"var(--pine)":"var(--amber)")+'">'
      + (paid?"Paid":(partial?usd(l)+" left":"Due"))+'</div></div>'
      + '</button></div></li>';
  }).join("") + '</ul></section>';
  return h;
}

function billsSortEntries(list){

    });

    sorted.sort(function(a,b){ return num(b.amount)-num(a.amount); });

function billsSection(){
  var active = S.bills.filter(function(b){return b.active;});
  var typical = active.reduce(function(s,b){return s+monthlyEq(b);},0);
  var busiest = 0;
  for(var m=1;m<=12;m++){
    var t = S.bills.reduce(function(s,b){return s+(dueInMonth(b,m)?num(b.amount):0);},0);
    if(t>busiest) busiest=t;
  }
  var leftover = num(S.income)-typical;

  var h = '<section class="card pad"><h2 class="eyebrow">Income &amp; plan</h2>'
    + moneyRow("Available funds (monthly)", S.income, "S.income=num(this.value);persist();render()")

    + '<div class="row"><span class="muted">Typical month of bills</span><span class="tnum" style="font-weight:600">'+usd(typical)+'</span></div>'
    + '<div class="row"><span class="muted">Busiest month</span><span class="tnum" style="font-weight:600">'+usd(busiest)+'</span></div>'
    + '<div class="row"><span class="muted">Left over (typical month)</span>'
    + '<span class="tnum" style="font-weight:700;color:'+(leftover>=0?"var(--pine)":"var(--red)")+'">'+usd(leftover)+'</span></div>'
    + '</div>'
    + (S.note ? '<div class="note-box">'+esc(S.note)+'</div>' : '')
    + '</section>';

  if(S.bills.length===0) return h;

  var chips = [];

  if(billsSearchQuery.trim()) chips.push(['Search: "'+esc(billsSearchQuery.trim())+'"', "closeBillsSearch()"]);
  if(chips.length){
    h += '<div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem">' + chips.map(function(c){
      return '<button class="calc-chip on" style="display:flex;align-items:center;gap:.3rem" onclick="'+c[1]+'">'+c[0]+' '+icon("x",12)+'</button>';
    }).join("") + '</div>';
  }

  var moreBtn = '<button class="btn-round" aria-label="Search, sort, and filter bills" style="flex:none;padding:.4rem" onclick="openBillsToolbarMenu()">'+icon("more",16)+'</button>';
  var listHeaderLeft;
  if(billsSearchOpen){
    listHeaderLeft = '<div class="field" style="display:flex;align-items:center;gap:.4rem;flex:1;min-width:0;margin:0;padding:0 .4rem 0 .6rem">'
      + '<span style="color:var(--sub);display:flex;flex:none">'+icon("search",14)+'</span>'
      + '<input id="billsSearchInput" style="flex:1;min-width:0;border:none;background:none;padding:.4rem 0;font-weight:500;font-size:.85rem" '
      + 'placeholder="Search bills…" value="'+esc(billsSearchQuery)+'" oninput="setBillsSearch(this)">'
      + '<button aria-label="Cancel search" style="color:var(--sub);padding:.2rem" onclick="closeBillsSearch()">'+icon("x",14)+'</button>'
      + '</div>';
  } else {
    listHeaderLeft = '<span class="muted" style="font-size:.75rem">'
      + (billsSort==="cat_group" ? "All bills, by category" : "Sorted: "+esc(billsSortLabel(billsSort))) + '</span>';
  }
  h += '<div class="row" style="margin-bottom:.6rem">' + listHeaderLeft
    + '<div style="display:flex;gap:.4rem;align-items:center;flex:none">' + moreBtn + '</div>'
    + '</div>';

  var visible = billsVisibleBills();
  if(visible.length===0){
    return h + '<section class="card pad"><p class="muted" style="font-size:.9rem">Nothing matches the current search or filter.</p></section>';
  }

  if(billsSort==="cat_group"){
    var groups = S.categories.map(function(c){
      return {cat:c, bills:visible.filter(function(b){return b.category===c;})};
    }).filter(function(g){return g.bills.length>0;});
    var stray = visible.filter(function(b){return S.categories.indexOf(b.category)<0;});
    if(stray.length) groups.push({cat:"Uncategorized", bills:stray});

    groups.forEach(function(g){
      var sub = g.bills.filter(function(b){return b.active;}).reduce(function(s,b){return s+monthlyEq(b);},0);
      h += '<section class="card"><div class="list-head">'
        + '<h3 style="font-size:.875rem;font-weight:700;display:flex;align-items:center;gap:.5rem">'
        + '<span class="cat-dot" style="width:9px;height:9px;background:'+catColor(g.cat)+'"></span>'+esc(g.cat)+'</h3>'
        + '<span class="tnum muted" style="font-size:.75rem;font-weight:600">'+usd(sub)+'/mo</span></div>'
        + '<ul class="plain">' + g.bills.map(billRow).join("") + '</ul></section>';
    });
  } else {
    h += '<section class="card"><ul class="plain">' + billsSortEntries(visible).map(billRow).join("") + '</ul></section>';
  }
  return h;
}

/* ---------- Funds section (budgeted categories, tied to the spending tracker) ---------- */
function fundSpentInMonth(fund, y, m){
  return S.journal.reduce(function(sum, e){
    if(e.category !== fund.category) return sum;
    var d = new Date(e.date+"T00:00:00");
    if(isNaN(d)) return sum;
    if(d.getFullYear()===y && (d.getMonth()+1)===m) return sum+num(e.amount);
    return sum;
  }, 0);
}

function fundsVisibleFunds(){
  var list = S.funds.slice();
  if(fundsFilterCategory){
    list = list.filter(function(f){ return f.category===fundsFilterCategory; });
  }
  var q = fundsSearchQuery.trim().toLowerCase();
  if(q){
    list = list.filter(function(f){
      return (f.name||"").toLowerCase().indexOf(q)>=0 || (f.category||"").toLowerCase().indexOf(q)>=0;
    });
  }
  return list;

function fundsSortEntries(list){
  var sorted = list.slice();
  if(fundsSort==="pct_desc"){
    sorted.sort(function(a,b){
      var pa = num(a.budget)>0 ? fundSpentInMonth(a, view.y, view.m)/num(a.budget) : 0;
      var pb = num(b.budget)>0 ? fundSpentInMonth(b, view.y, view.m)/num(b.budget) : 0;
      return pb-pa;
    });
  } else if(fundsSort==="cat_asc"){
    sorted.sort(function(a,b){ return (a.category||"").localeCompare(b.category||"") || (a.name||"").localeCompare(b.name||""); });
  } else {
    sorted.sort(function(a,b){ return (a.name||"").localeCompare(b.name||""); });
  }
  return sorted;
}
function fundsSection(){
  var active = S.funds.filter(function(f){ return f.active; });
  var budgetTotal = active.reduce(function(s,f){ return s+num(f.budget); },0);
  var spentTotal = active.reduce(function(s,f){ return s+fundSpentInMonth(f, view.y, view.m); },0);
  var leftTotal = budgetTotal - spentTotal;

  var h = '<section class="card pad"><h2 class="eyebrow">Funds — '+MS[view.m-1]+' '+view.y+'</h2>'
    + '<p class="muted" style="font-size:.85rem;margin-bottom:.75rem">Budgeted amounts for spending that varies month to month — groceries, gas, and the like. Log it in Log → Spending with the matching category and it counts here automatically.</p>';
  if(S.funds.length===0){
    h += '<p class="muted" style="font-size:.9rem">No funds yet. Tap “+ Add fund” to set your first budget.</p>'
      + '</section>';
    return h;
  }
  h += '<div class="row"><span class="muted" style="font-size:.85rem">Total budgeted</span><span class="tnum" style="font-weight:700">'+usd(budgetTotal)+'</span></div>'
    + '<div class="row"><span class="muted" style="font-size:.85rem">Spent so far</span><span class="tnum" style="font-weight:700">'+usd(spentTotal)+'</span></div>'
    + '<div class="divider"></div>'
    + '<div class="row"><span class="lbl">Left across all funds</span>'
    + '<span class="tnum" style="font-weight:800;color:'+(leftTotal>=0?"var(--pine)":"var(--red)")+'">'+usd(leftTotal)+'</span></div>'
    + '</section>';

  var chips = [];
  if(fundsFilterCategory) chips.push([esc(fundsFilterCategory), "clearFundsFilterCategory()"]);
  if(fundsSearchQuery.trim()) chips.push(['Search: "'+esc(fundsSearchQuery.trim())+'"', "closeFundsSearch()"]);
  if(chips.length){
    h += '<div style="display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem">' + chips.map(function(c){
      return '<button class="calc-chip on" style="display:flex;align-items:center;gap:.3rem" onclick="'+c[1]+'">'+c[0]+' '+icon("x",12)+'</button>';
    }).join("") + '</div>';
  }

  var moreBtn = '<button class="btn-round" aria-label="Search, sort, and filter funds" style="flex:none;padding:.4rem" onclick="openFundsToolbarMenu()">'+icon("more",16)+'</button>';
  var listHeaderLeft;
  if(fundsSearchOpen){
    listHeaderLeft = '<div class="field" style="display:flex;align-items:center;gap:.4rem;flex:1;min-width:0;margin:0;padding:0 .4rem 0 .6rem">'
      + '<span style="color:var(--sub);display:flex;flex:none">'+icon("search",14)+'</span>'
      + '<input id="fundsSearchInput" style="flex:1;min-width:0;border:none;background:none;padding:.4rem 0;font-weight:500;font-size:.85rem" '
      + 'placeholder="Search funds…" value="'+esc(fundsSearchQuery)+'" oninput="setFundsSearch(this)">'
      + '<button aria-label="Cancel search" style="color:var(--sub);padding:.2rem" onclick="closeFundsSearch()">'+icon("x",14)+'</button>'
      + '</div>';
  } else {
    listHeaderLeft = '<span class="muted" style="font-size:.75rem">'
      + (fundsSort==="name_asc" ? "All funds" : "Sorted: "+esc(fundsSortLabel(fundsSort))) + '</span>';
  }
  h += '<div class="row" style="margin-bottom:.6rem">' + listHeaderLeft
    + '<div style="display:flex;gap:.4rem;align-items:center;flex:none">' + moreBtn + '</div>'
    + '</div>';

  var visible = fundsSortEntries(fundsVisibleFunds());
  if(visible.length===0){
    return h + '<section class="card pad"><p class="muted" style="font-size:.9rem">Nothing matches the current search or filter.</p></section>';
  }

  h += '<section class="card">';
  visible.forEach(function(f, i){
    var spent = fundSpentInMonth(f, view.y, view.m);
    var budget = num(f.budget);
    var left = budget - spent;
    var pct = budget>0 ? Math.max(0, Math.min(100, spent/budget*100)) : 0;
    var over = spent > budget;
    h += (i>0 ? '<div class="divider"></div>' : '')
      + '<button style="width:100%;text-align:left;display:block;padding:.85rem 1rem'+(i===0?' 0':'')+'" onclick="openFundForm(\''+f.id+'\')">'
      + '<div class="row" style="margin-bottom:.1rem">'
      + '<span style="display:flex;align-items:center;gap:.5rem;font-weight:600;font-size:.9rem'+(f.active?'':';color:var(--sub)')+'">'
      + '<span class="cat-dot" style="background:'+catColor(f.category)+'"></span>'+esc(f.name)
      + (f.active?'':' <span style="font-size:.7rem;font-weight:500;padding:.1rem .35rem;border-radius:.25rem;background:var(--line);color:var(--sub)">Paused</span>')
      + '</span>'
      + '<span class="tnum" style="font-weight:700;font-size:.9rem;color:'+(over?"var(--red)":"var(--pine)")+'">'+usd(left)+' left</span>'
      + '</div>'
      + '<div class="bill-cat" style="margin-bottom:.4rem">'+esc(f.category)+' · '+usd(spent)+' of '+usd(budget)+' spent</div>'
      + '<div class="cat-bar"><div class="fill" style="width:'+pct+'%;background:'+(over?"var(--red)":"var(--pine)")+'"></div></div>'
      + '</button>';
  });
  h += '</section>';
  return h;
}
function openFundForm(id){

  var f = id ? S.funds.filter(function(x){return x.id===id;})[0] : null;
  var cat = f ? f.category : (S.categories[0] || "__new");

    + '<div class="fgroup"><label class="flabel">Category</label>'
    + '<select id="fdCat" class="field" onchange="document.getElementById(\'fdNewCatWrap\').className=this.value===\'__new\'?\'\':\'hidden\'">'+opts+'</select>'
    + '<div id="fdNewCatWrap" class="'+(cat==="__new"?"":"hidden")+'"><input id="fdNewCat" class="field" style="margin-top:.5rem" placeholder="Category name"></div>'
    + '<p class="muted" style="font-size:.72rem;margin-top:.35rem">Log spending under this same category in Log → Spending, and it\'ll count against this fund\'s budget.</p></div>'
    + '<div class="fgroup"><button class="field row" style="cursor:pointer" onclick="fdToggle(this)">'
    + '<span id="fdActiveLbl" style="font-size:.875rem;font-weight:500">'+(isActive?"Active — counts in totals":"Paused — kept, but not counted")+'</span>'
    + '<span id="fdActive" class="toggle'+(isActive?" on":"")+'" data-on="'+(isActive?1:0)+'"><span class="knob"></span></span></button></div>'
    + '<p id="fdErr" class="msg-err" style="display:none"></p>'
    + '<button class="btn btn-pine" style="width:100%;margin-top:1rem;padding:.8rem" onclick="fdSave()">'+(f?"Save changes":"Add fund")+'</button>'
    + (f ? '<button id="fdDel" class="btn btn-danger" style="width:100%;margin-top:.5rem" onclick="fdDelete()">Delete this fund</button>' : ''));
}
function fdToggle(btn){
  var t = document.getElementById("fdActive"), lbl = document.getElementById("fdActiveLbl");
  var on = t.getAttribute("data-on")==="1";
  t.setAttribute("data-on", on?"0":"1");
  t.className = "toggle"+(on?"":" on");
  lbl.textContent = on ? "Paused — kept, but not counted" : "Active — counts in totals";
}
function fdSave(){
  var name = document.getElementById("fdName").value.trim();
  var budget = num(document.getElementById("fdBudget").value);
  var catSel = document.getElementById("fdCat").value;
  var cat = catSel==="__new" ? document.getElementById("fdNewCat").value.trim() : catSel;
  var active = document.getElementById("fdActive").getAttribute("data-on")==="1";
  var err = document.getElementById("fdErr");
  function fail(m){ err.textContent=m; err.style.display="block"; }
  if(!name) return fail("Give the fund a name.");
  if(!budget) return fail("Enter a budget above zero.");
  if(!cat) return fail("Pick or type a category.");
  var fund = { id: fundEditId || ("f"+Date.now()), name:name, budget:budget, category:cat, active:active };
  var found = false;
  S.funds = S.funds.map(function(x){ if(x.id===fund.id){found=true; return fund;} return x; });
  if(!found) S.funds.push(fund);
  if(S.categories.indexOf(cat)<0) S.categories.push(cat);
  persist(); closeModal(); render();
}
function fdDelete(){
  if(!fundConfirmDel){
    fundConfirmDel = true;
    var btn = document.getElementById("fdDel");
    btn.textContent = "Tap again to delete for good";
    btn.className = "btn btn-danger armed";
    btn.style.width = "100%"; btn.style.marginTop = ".5rem";
    return;
  }
  var id = fundEditId;
  S.funds = S.funds.filter(function(f){return f.id!==id;});
  persist(); closeModal(); render();
}

function setReportSubMode(m){ reportSubMode = m; render(); }
function reportsSection(){
  var pStyle = "padding:.28rem .5rem;font-size:.76rem";
  var subSeg = '<div class="seg" style="margin:0">'
    + '<button style="'+pStyle+'" class="'+(reportSubMode==="bills"?"on":"")+'" onclick="setReportSubMode(\'bills\')">Bills</button>'
    + '<button style="'+pStyle+'" class="'+(reportSubMode==="spending"?"on":"")+'" onclick="setReportSubMode(\'spending\')">Spending</button>'
    + '<button style="'+pStyle+'" class="'+(reportSubMode==="savings"?"on":"")+'" onclick="setReportSubMode(\'savings\')">Savings</button>'
    + '</div>';
  var scopeSeg = "";
  if(reportSubMode!=="savings"){
    scopeSeg = '<div class="seg" style="margin:0">'
      + '<button style="'+pStyle+'" class="'+(reportScope==="month"?"on":"")+'" onclick="reportScope=\'month\';render()">'+MS[view.m-1]+' '+view.y+'</button>'
      + '<button style="'+pStyle+'" class="'+(reportScope==="year"?"on":"")+'" onclick="reportScope=\'year\';render()">'+view.y+'</button>'
      + '</div>';
  } else if(S.savingsGoals.length<5){
    // Savings has no month/year scope (goals aren't period-based) — use that space for
    // goal management instead, since this is now where goals are added/edited/deleted too.
    scopeSeg = '<button class="btn btn-pine" style="padding:.4rem .85rem;border-radius:999px;flex:none" onclick="openGoalForm(null)">+ Add goal</button>';
  }
  var row = '<div class="row" style="flex-wrap:wrap;row-gap:.5rem;margin-bottom:1rem">' + subSeg + scopeSeg + '</div>';
  if(reportSubMode==="spending") return row + spendingReportBody();
  if(reportSubMode==="savings") return row + savingsReportBody();
  return row + billsReportBody();
}
function billsReportBody(){
  var byCat = {};
  function add(c,v){ byCat[c]=(byCat[c]||0)+v; }
  if(reportScope==="month"){
    S.bills.forEach(function(b){ if(dueInMonth(b,view.m)) add(b.category,num(b.amount)); });
  }else{
    for(var m=1;m<=12;m++) S.bills.forEach(function(b){ if(dueInMonth(b,m)) add(b.category,num(b.amount)); });
  }
  var rows = Object.keys(byCat).map(function(c){return {cat:c,v:byCat[c]};}).sort(function(a,b){return b.v-a.v;});
  var total = rows.reduce(function(s,r){return s+r.v;},0);
  var income = reportScope==="month" ? num(S.income) : num(S.income)*12;

  /* donut via conic-gradient */
  var stops=[], acc=0;
  rows.forEach(function(r){
    var from = total>0 ? acc/total*360 : 0;
    acc += r.v;
    var to = total>0 ? acc/total*360 : 0;
    stops.push(catColor(r.cat)+" "+from+"deg "+to+"deg");
  });
  var donutBg = stops.length ? "conic-gradient("+stops.join(",")+")" : "var(--line)";

  var h = '<section class="card pad">'
    + '<div class="donut-wrap"><div class="donut" style="background:'+donutBg+'"></div>'
    + '<div class="donut-hole"><span class="amt tnum">'+usd(total)+'</span>'
    + '<span class="cap">'+(reportScope==="month"?"due this month":"planned this year")+'</span></div></div>';

  if(rows.length===0){
    h += '<p class="muted" style="font-size:.9rem">Nothing scheduled for this period.</p>';
  }else{
    h += rows.map(function(r){
      var pct = total>0 ? r.v/total*100 : 0;
      return '<div class="report-li">'
        + '<div class="row"><span style="display:flex;align-items:center;gap:.5rem;font-weight:600;font-size:.875rem">'
        + '<span class="cat-dot" style="width:9px;height:9px;background:'+catColor(r.cat)+'"></span>'+esc(r.cat)+'</span>'
        + '<span class="tnum" style="font-size:.875rem"><b>'+usd(r.v)+'</b> <span class="muted" style="font-size:.75rem">'+Math.round(pct)+'%</span></span></div>'
        + '<div class="cat-bar"><div class="fill" style="width:'+pct+'%;background:'+catColor(r.cat)+'"></div></div>'
        + '</div>';
    }).join("");
  }
  var diff = income-total;
  h += '<div class="divider"></div><div class="row" style="font-size:.875rem">'
    + '<span class="muted">vs. income of '+usd(income)+'</span>'
    + '<span class="tnum" style="font-weight:700;color:'+(diff>=0?"var(--pine)":"var(--red)")+'">'
    + (diff>=0 ? usd(diff)+" left over" : usd(-diff)+" over")+'</span></div>'
    + '</section>'
    + '<p class="muted" style="font-size:.75rem;text-align:center;padding:0 1rem">Based on scheduled amounts for active bills. Paused bills aren\'t counted.</p>';
  return h;
}
function spendingReportBody(){
  var jRows = journalRowsForScope(reportScope);
  var jTotal = jRows.reduce(function(s,r){ return s+r.v; },0);
  var h = '<section class="card pad">'
    + '<div class="donut-wrap"><div class="donut" style="background:'+donutBgFor(jRows,jTotal)+'"></div>'
    + '<div class="donut-hole"><span class="amt tnum">'+usd(jTotal)+'</span>'
    + '<span class="cap">'+(reportScope==="month"?"logged this month":"logged this year")+'</span></div></div>'
    + categoryListHtml(jRows,jTotal)
    + '</section>';
  return h;
}
function savingsReportBody(){
  if(!S.savingsGoals.length){
    return '<section class="card pad"><h2 class="eyebrow">Set a savings goal</h2>'
      + '<p class="muted" style="font-size:.875rem;margin-bottom:.9rem">Give it a name and a target, then log deposits from the Log tab. You can add up to 5 goals.</p>'
      + '<button class="btn btn-pine" style="width:100%" onclick="openGoalForm(null)">Set a goal</button>'
      + '</section>';
  }
  var h = '<section class="card">';
  S.savingsGoals.forEach(function(g, i){
    var saved = savingsTotalFor(g.id);
    var target = num(g.target);
    var pct = target>0 ? Math.max(0, Math.min(100, saved/target*100)) : 0;
    var reached = target>0 && saved>=target;
    h += (i>0 ? '<div class="divider"></div>' : '')
      + '<button style="width:100%;text-align:left;display:block;padding:.85rem 1rem'+(i===0?' 0':'')+'" onclick="openGoalForm(\''+g.id+'\')">'
      + '<div class="row" style="margin-bottom:.4rem">'
      + '<span style="font-weight:600;font-size:.9rem">'+esc(g.name)+'</span>'
      + '<span class="tnum" style="font-weight:700;font-size:.9rem;color:'+(reached?"var(--pine)":"var(--ink)")+'">'+usd(saved)+' <span class="muted" style="font-weight:500">of '+usd(target)+'</span></span>'
      + '</div>'
      + '<div class="cat-bar"><div class="fill" style="width:'+pct+'%;background:var(--pine)"></div></div>'
      + '<div class="track-caption"><span>'+Math.round(pct)+'% there</span><span class="tnum">'+usd(Math.max(0,target-saved))+' to go</span></div>'
      + '</button>';
  });
  h += '</section>';
  if(S.savingsGoals.length>=5){
    h += '<p class="muted" style="font-size:.75rem;text-align:center;padding:0 1rem">You’ve reached the 5-goal limit. Delete or rename an existing goal to make room for a new one.</p>';
  }
  return h;
}
function journalRowsForScope(scope){
  var byCat = {};
  function add(c,v){ byCat[c]=(byCat[c]||0)+v; }
  S.journal.forEach(function(e){
    var d = new Date(e.date+"T00:00:00");
    if(isNaN(d)) return;
    var ey=d.getFullYear(), em=d.getMonth()+1;
    if(scope==="month"){ if(ey===view.y && em===view.m) add(e.category||"Uncategorized", num(e.amount)); }
    else { if(ey===view.y) add(e.category||"Uncategorized", num(e.amount)); }
  });
  return Object.keys(byCat).map(function(c){ return {cat:c, v:byCat[c]}; }).sort(function(a,b){ return b.v-a.v; });
}
function donutBgFor(rows,total){
  var stops=[], acc=0;
  rows.forEach(function(r){
    var from = total>0 ? acc/total*360 : 0;
    acc += r.v;
    var to = total>0 ? acc/total*360 : 0;
    stops.push(catColor(r.cat)+" "+from+"deg "+to+"deg");
  });
  return stops.length ? "conic-gradient("+stops.join(",")+")" : "var(--line)";
}
function categoryListHtml(rows,total){
  if(rows.length===0) return '<p class="muted" style="font-size:.9rem">Nothing logged for this period.</p>';
  return rows.map(function(r){
    var pct = total>0 ? r.v/total*100 : 0;
    return '<div class="report-li">'
      + '<div class="row"><span style="display:flex;align-items:center;gap:.5rem;font-weight:600;font-size:.875rem">'
      + '<span class="cat-dot" style="width:9px;height:9px;background:'+catColor(r.cat)+'"></span>'+esc(r.cat)+'</span>'
      + '<span class="tnum" style="font-size:.875rem"><b>'+usd(r.v)+'</b> <span class="muted" style="font-size:.75rem">'+Math.round(pct)+'%</span></span></div>'
      + '<div class="cat-bar"><div class="fill" style="width:'+pct+'%;background:'+catColor(r.cat)+'"></div></div>'
      + '</div>';
  }).join("");
}

/* ---------- calculator engine (used by the popup calculator) ---------- */
function fmtNum(n){
  if(!isFinite(n)) return "Error";
  var r = Math.round(n*1e10)/1e10;
  return r.toLocaleString("en-US", { maximumFractionDigits:10 });
}
function fmtEntry(s){
  if(s === "" || s === "-") return s === "-" ? "-0" : "0";
  var neg = s.charAt(0) === "-";
  var body = neg ? s.slice(1) : s;
  var parts = body.split(".");
  var intp = (parts[0] || "0").replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  var out = intp + (parts.length > 1 ? "." + parts[1] : "");
  return (neg ? "-" : "") + out;
}
function opSym(op){ return op === "*" ? "×" : op === "/" ? "÷" : op === "-" ? "−" : "+"; }
function applyOp(a, op, b){
  a = +a; b = +b;
  if(op === "+") return a + b;
  if(op === "-") return a - b;
  if(op === "*") return a * b;
  if(op === "/") return b === 0 ? NaN : a / b;
  return b;
}
function histHtml(){
  if(!activeCalc.history.length){
    return '<p class="muted" style="font-size:.75rem;text-align:center;padding:.15rem 0 0">Recent results will show here — tap one to reuse it.</p>';
  }
  return activeCalc.history.slice(-8).reverse().map(function(h){
    return '<button class="calc-chip" onclick="calcUseResult('+h.result+')">'+esc(h.expr)+' = <b>'+esc(fmtNum(h.result))+'</b></button>';
  }).join("");
}
function keypad(){
  function b(label, fn, cls, span){
    return '<button class="calc-btn '+(cls||"")+'"'+(span?' style="grid-column:span '+span+'"':'')+' onclick="'+fn+'">'+label+'</button>';
  }
  return '<div class="keys">'
    + b("C","calcClear()","fn") + b("⌫","calcBack()","fn") + b("%","calcPercent()","fn") + b("÷","calcOp('/')","op")
    + b("7","calcDigit('7')") + b("8","calcDigit('8')") + b("9","calcDigit('9')") + b("×","calcOp('*')","op")
    + b("4","calcDigit('4')") + b("5","calcDigit('5')") + b("6","calcDigit('6')") + b("−","calcOp('-')","op")
    + b("1","calcDigit('1')") + b("2","calcDigit('2')") + b("3","calcDigit('3')") + b("+","calcOp('+')","op")
    + b("0","calcDigit('0')",null,2) + b(".","calcDot()") + b("=","calcEquals()","eq")
    + '</div>';
}
function fitDisplay(el){
  if(!el) return;
  el.style.fontSize = "";
  if(!el.clientWidth) return;
  var size = 2.1, guard = 0;
  el.style.fontSize = size + "rem";
  while(el.scrollWidth > el.clientWidth && size > 0.9 && guard < 30){
    size -= 0.1;
    el.style.fontSize = size.toFixed(2) + "rem";
    guard++;
  }
}
function calcRefresh(){
  var d = document.getElementById("calcDisplay");
  if(d){ d.textContent = fmtEntry(activeCalc.entry); fitDisplay(d); }
  var t = document.getElementById("calcTop");
  if(t) t.textContent = (activeCalc.acc !== null && activeCalc.pending) ? fmtNum(activeCalc.acc)+" "+opSym(activeCalc.pending) : "";
  var h = document.getElementById("calcHistWrap");
  if(h) h.innerHTML = histHtml();
}
/* Full keypad calculator shown inline as the Tools tab's "Calculator" segment. */
function calcInlineScreen(){
  var keys = keypad();
  var top = (activeCalc.acc !== null && activeCalc.pending) ? fmtNum(activeCalc.acc)+" "+opSym(activeCalc.pending) : "";
  return '<section class="card pad">'
    + '<div class="calc-top" id="calcTop">'+esc(top)+'</div>'
    + '<div class="calc-display" id="calcDisplay">'+esc(fmtEntry(activeCalc.entry))+'</div>'
    + '</section>'
    + '<div class="calc-hist" id="calcHistWrap">'+histHtml()+'</div>'
    + '<section class="card pad">'+keys+'</section>';
}
function calcDigit(d){
  if(activeCalc.justEq){ activeCalc.entry = "0"; activeCalc.justEq = false; }
  if(activeCalc.entry === "Error") activeCalc.entry = "0";
  activeCalc.entry = (activeCalc.entry === "0") ? d : activeCalc.entry + d;
  calcRefresh();
}
function calcDot(){
  if(activeCalc.justEq){ activeCalc.entry = "0"; activeCalc.justEq = false; }
  if(activeCalc.entry === "Error") activeCalc.entry = "0";
  if(activeCalc.entry.indexOf(".") < 0) activeCalc.entry += ".";
  calcRefresh();
}
function calcBack(){
  if(activeCalc.justEq){ return; }
  var e = activeCalc.entry;
  e = (e.length > 1) ? e.slice(0, -1) : "0";
  if(e === "-" || e === "") e = "0";
  activeCalc.entry = e;
  calcRefresh();
}
function calcClear(){
  activeCalc.acc = null; activeCalc.pending = null; activeCalc.entry = "0"; activeCalc.justEq = false;
  calcRefresh();
}
function calcOp(op){
  var cur = parseFloat(activeCalc.entry) || 0;
  if(activeCalc.pending !== null && !activeCalc.justEq){
    activeCalc.acc = applyOp(activeCalc.acc, activeCalc.pending, cur);
  } else {
    activeCalc.acc = cur;
  }
  activeCalc.pending = op;
  activeCalc.entry = "0";
  activeCalc.justEq = false;
  calcRefresh();
}
function calcEquals(){
  if(activeCalc.pending === null) return;
  var cur = parseFloat(activeCalc.entry) || 0;
  var left = activeCalc.acc === null ? 0 : activeCalc.acc;
  var result = applyOp(left, activeCalc.pending, cur);
  var expr = fmtNum(left) + " " + opSym(activeCalc.pending) + " " + fmtNum(cur);
  if(isFinite(result)){
    activeCalc.history.push({ expr:expr, result:result });
    if(activeCalc.history.length > 30) activeCalc.history.shift();
  }
  activeCalc.acc = null;
  activeCalc.pending = null;
  activeCalc.entry = isFinite(result) ? String(result) : "Error";
  activeCalc.justEq = true;
  calcRefresh();
}
function calcPercent(){
  var cur = parseFloat(activeCalc.entry) || 0;
  if(activeCalc.pending !== null && activeCalc.acc !== null){
    cur = activeCalc.acc * cur / 100;
  } else {
    cur = cur / 100;
  }
  activeCalc.entry = String(cur);
  activeCalc.justEq = false;
  calcRefresh();
}
function calcUseResult(v){
  activeCalc.entry = String(v);
  activeCalc.justEq = true;
  calcRefresh();
}

/* ---------- popup calculator attached to a money input ---------- */
function calcBtn(){
  return '<button type="button" class="calcbtn" tabindex="-1" aria-label="Open calculator" onclick="openCalcForInput(this)">'+icon("calc",16)+'</button>';
}
function calcResolve(st){
  var cur = parseFloat(st.entry) || 0;
  if(st.pending !== null) return applyOp(st.acc, st.pending, cur);
  return cur;
}
// targetInput: an <input> to write the result back into, or null for a standalone scratch calculator.
function openCalcModal(targetInput){
  calcTargetInput = targetInput || null;
  var start = targetInput ? (targetInput.value || "").replace(/[^0-9.]/g, "") : "0";
  padState = { acc:null, pending:null, entry:(start === "" || start === ".") ? "0" : start, justEq:true, history: calcState.history.slice() };
  activeCalc = padState;
  var keys = keypad();
  var footer = calcTargetInput
    ? '<div class="grid2" style="margin-top:.75rem">'
      + '<button class="btn btn-ghost" onclick="cancelCalcModal()">Cancel</button>'
      + '<button class="btn btn-pine" onclick="applyCalcToInput()">Use result</button>'
      + '</div>'
    : '<button class="btn btn-pine" style="width:100%;margin-top:.75rem" onclick="cancelCalcModal()">Done</button>';
  document.getElementById("calcModalRoot").innerHTML =
    '<div class="overlay" style="z-index:60" onclick="if(event.target===this)cancelCalcModal()">'
    + '<div class="sheet"><div class="sheet-head"><h2>Calculator</h2>'

    + '<div class="calc-top" id="calcTop"></div>'
    + '<div class="calc-display" id="calcDisplay">0</div>'
    + '<div class="calc-hist" id="calcHistWrap" style="margin-top:.4rem"></div>'

    + '</div></div>';
  calcRefresh();
}
function openCalcForInput(btn){
  var inp = btn.parentNode.querySelector("input");
  if(!inp) return;
  openCalcModal(inp);
}
function cancelCalcModal(){
  if(padState) calcState.history = padState.history.slice();
  document.getElementById("calcModalRoot").innerHTML = "";
  activeCalc = calcState; calcTargetInput = null; padState = null;
}
function applyCalcToInput(){
  var val = calcResolve(activeCalc);
  if(!isFinite(val)) val = 0;
  val = Math.round(val * 100) / 100;
  var inp = calcTargetInput;
  if(padState) calcState.history = padState.history.slice();
  document.getElementById("calcModalRoot").innerHTML = "";
  activeCalc = calcState; calcTargetInput = null; padState = null;
  if(inp){
    inp.value = String(val);
    inp.dispatchEvent(new Event("change", { bubbles:true }));
  }
}
// Keyboard support for the popup calculator (helpful on laptops/desktops).
function calcKeydown(e){
  if(!padState) return;
  var k = e.key;
  if(k >= "0" && k <= "9"){ calcDigit(k); e.preventDefault(); }
  else if(k === "."){ calcDot(); e.preventDefault(); }
  else if(k === "+" || k === "-" || k === "*" || k === "/"){ calcOp(k); e.preventDefault(); }
  else if(k === "%"){ calcPercent(); e.preventDefault(); }
  else if(k === "="){ calcEquals(); e.preventDefault(); }
  else if(k === "Enter"){ applyCalcToInput(); e.preventDefault(); }
  else if(k === "Backspace"){ calcBack(); e.preventDefault(); }
  else if(k === "Escape"){ cancelCalcModal(); e.preventDefault(); }
}

/* ---------- Investment calculator ---------- */
function setCalc(key, val){
  if(key==="freq") calc.freq = val;
  else calc[key] = num(val);
  render();
}
function projectCalc(){
  var start = num(calc.start), c = num(calc.contrib), rate = num(calc.rate)/100;
  var yrs = Math.max(1, Math.min(60, Math.round(num(calc.years)) || 1));
  var mRate = rate/12;
  var bal = start, contributed = start;
  var balSeries = [start], contribSeries = [start];
  for(var y=1; y<=yrs; y++){
    for(var mo=1; mo<=12; mo++){
      bal = bal*(1+mRate);
      if(calc.freq==="monthly"){ bal += c; contributed += c; }
      else if(mo===12){ bal += c; contributed += c; }
    }
    balSeries.push(bal); contribSeries.push(contributed);
  }
  return { balSeries:balSeries, contribSeries:contribSeries, yrs:yrs,
    finalBalance:bal, contributed:contributed, growth:bal-contributed };
}
function growthChart(p){
  var W=328, H=180, padL=6, padR=6, padT=14, padB=24;
  var maxY = p.finalBalance>0 ? p.finalBalance : 1;
  var baseline = H-padB;
  var xi = function(i){ return padL + (i/p.yrs)*(W-padL-padR); };
  var yi = function(v){ return baseline - (v/maxY)*(H-padT-padB); };
  function area(series){
    var d = "M "+xi(0).toFixed(1)+","+baseline;
    for(var i=0;i<series.length;i++) d += " L "+xi(i).toFixed(1)+","+yi(series[i]).toFixed(1);
    d += " L "+xi(p.yrs).toFixed(1)+","+baseline+" Z";
    return d;
  }
  function line(series){
    var d = "";
    for(var i=0;i<series.length;i++) d += (i?" L ":"M ")+xi(i).toFixed(1)+","+yi(series[i]).toFixed(1);
    return d;
  }
  var nowYear = view.y;
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block" preserveAspectRatio="xMidYMid meet">'
    + '<path d="'+area(p.balSeries)+'" fill="var(--pine-soft)"/>'
    + '<path d="'+area(p.contribSeries)+'" fill="#CFE3D8"/>'
    + '<path d="'+line(p.balSeries)+'" fill="none" stroke="var(--pine)" stroke-width="2.5" stroke-linejoin="round"/>'
    + '<path d="'+line(p.contribSeries)+'" fill="none" stroke="#7FA890" stroke-width="1.5" stroke-dasharray="3 3"/>'
    + '<text x="'+padL+'" y="'+(H-7)+'" font-size="10" fill="var(--sub)">'+nowYear+'</text>'
    + '<text x="'+(W-padR)+'" y="'+(H-7)+'" font-size="10" fill="var(--sub)" text-anchor="end">'+(nowYear+p.yrs)+'</text>'
    + '</svg>';
}
function calcField(label, key, prefix, suffix){
  return '<div class="fgroup"><label class="flabel">'+label+'</label>'
    + '<div class="money" style="width:auto;border-radius:.75rem;padding:0 .75rem">'
    + (prefix?'<span>'+prefix+'</span>':'')
    + '<input class="tnum" inputmode="decimal" value="'+esc(String(calc[key]))+'" '
    + 'style="padding:.6rem .25rem;text-align:left;font-size:1rem" '

function investScreen(){

/* --- linking a journal entry to a bill (reuses the same paid/left tracking as the Month screen) --- */
function monthDataAt(y,m){ return S.months[mk(y,m)] || emptyMonth(); }
function billLeftAt(y,m,billId){
  var bill = S.bills.filter(function(b){ return b.id===billId; })[0];
  if(!bill) return 0;
  var data = monthDataAt(y,m);
  var v = data.left ? data.left[billId] : undefined;
  return (v===undefined||v===null) ? num(bill.amount) : num(v);
}
function setBillLeftAt(y,m,billId,value){
  var k = mk(y,m);
  if(!S.months[k]) S.months[k] = emptyMonth();
  if(!S.months[k].left) S.months[k].left = {};
  S.months[k].left[billId] = value;
}
function applyJournalToBill(entry){
  if(!entry.billLink) return;
  var bill = S.bills.filter(function(b){ return b.id===entry.billLink.billId; })[0];
  if(!bill) return;
  var cur = billLeftAt(entry.billLink.y, entry.billLink.m, entry.billLink.billId);
  setBillLeftAt(entry.billLink.y, entry.billLink.m, entry.billLink.billId, Math.max(0, cur - num(entry.amount)));
}
function revertJournalFromBill(entry){
  if(!entry.billLink) return;
  var bill = S.bills.filter(function(b){ return b.id===entry.billLink.billId; })[0];
  if(!bill) return;
  var cur = billLeftAt(entry.billLink.y, entry.billLink.m, entry.billLink.billId);
  var full = num(bill.amount);
  setBillLeftAt(entry.billLink.y, entry.billLink.m, entry.billLink.billId, Math.min(full, cur + num(entry.amount)));
}
function journalDueBillOptions(dateStr, selectedId){
  var d = new Date(dateStr+"T00:00:00");
  if(isNaN(d)) return '<option value="">— None —</option>';
  var y=d.getFullYear(), m=d.getMonth()+1;
  var due = S.bills.filter(function(b){ return dueInMonth(b,m); });
  var opts = '<option value=""'+(selectedId?"":" selected")+'>— None —</option>';
  due.forEach(function(b){
    var left = billLeftAt(y,m,b.id);
    opts += '<option value="'+b.id+'"'+(b.id===selectedId?" selected":"")+'>'+esc(b.name)+' ('+esc(usd(left))+' left)</option>';
  });
  if(due.length===0) opts += '<option value="" disabled>No bills due that month</option>';
  return opts;
}

function jfSave(){
  var name = document.getElementById("jfName").value.trim();
  var amount = num(document.getElementById("jfAmount").value);
  var date = document.getElementById("jfDate").value;
  var catSel = document.getElementById("jfCat").value;
  var cat = catSel==="__new" ? document.getElementById("jfNewCat").value.trim() : catSel;
  var billId = document.getElementById("jfBill").value;
  var err = document.getElementById("jfErr");
  function fail(m){ err.textContent=m; err.style.display="block"; }
  if(!name) return fail("Give it a short name.");
  if(!amount) return fail("Enter an amount above zero.");
  if(!date) return fail("Pick a date.");
  if(!cat) return fail("Pick or type a category.");

  var prev = jEditId ? S.journal.filter(function(x){ return x.id===jEditId; })[0] : null;
  if(prev) revertJournalFromBill(prev);

  var d = new Date(date+"T00:00:00");
  var billLink = billId ? { y:d.getFullYear(), m:d.getMonth()+1, billId:billId } : null;
  var entry = { id: jEditId || ("j"+Date.now()), name:name, amount:amount, date:date, category:cat, billLink:billLink };
  if(billLink) applyJournalToBill(entry);

  var found = false;
  S.journal = S.journal.map(function(x){ if(x.id===entry.id){ found=true; return entry; } return x; });
  if(!found) S.journal.push(entry);
  if(S.categories.indexOf(cat)<0) S.categories.push(cat);

  persist(); closeModal(); render();
}

/* --- savings goals (up to 5) ---
   Migration note: pre-multi-goal saves had a single S.savingsGoal object and untagged
   S.savingsEntries. migrateSavingsGoals() converts that into S.savingsGoals (an array) and
   tags every legacy entry with the new goal's id, so no deposit history is lost. It's driven
   off the presence of the OLD `savingsGoal` key (not the absence of the new one) so it also
   fires when restoring an older-format backup file, not just on first boot. */
function migrateSavingsGoals(){
  if(S.savingsGoal !== undefined){
    var goals = (S.savingsGoals && S.savingsGoals.length) ? S.savingsGoals.slice() : [];
    var old = S.savingsGoal;
    var hasUntagged = (S.savingsEntries||[]).some(function(e){ return !e.goalId; });
    if(goals.length===0 && old && old.name){
      goals.push({ id:"g"+Date.now(), name:old.name, target:num(old.target) });
    } else if(goals.length===0 && hasUntagged){
      goals.push({ id:"g"+Date.now(), name:"Savings", target:0 });
    }
    if(goals.length){
      var gid = goals[0].id;
      S.savingsEntries = (S.savingsEntries||[]).map(function(e){
        if(!e.goalId) e.goalId = gid;
        return e;
      });
    }
    S.savingsGoals = goals;
    delete S.savingsGoal;
  }
  if(!S.savingsGoals) S.savingsGoals = [];
  if(S.savingsGoals.length > 5) S.savingsGoals = S.savingsGoals.slice(0,5);
}
function savingsTotalFor(goalId){
  return S.savingsEntries.reduce(function(s,e){
    if(e.goalId !== goalId) return s;
    return s + (e.type==="withdrawal" ? -num(e.amount) : num(e.amount));
  },0);
}
function ensureActiveSavingsGoal(){
  if(!S.savingsGoals.length){ activeSavingsGoalId = null; return null; }
  var found = S.savingsGoals.filter(function(g){ return g.id===activeSavingsGoalId; })[0];
  if(!found){ activeSavingsGoalId = S.savingsGoals[0].id; found = S.savingsGoals[0]; }
  return found;
}

/* --- CSV helpers (shared by Journal and Savings exports) --- */
function csvEscape(s){
  s = String(s==null?"":s);
  if(/[",\n]/.test(s)) return '"'+s.replace(/"/g,'""')+'"';
  return s;
}
function toCsv(headers, rows){
  var lines = [headers.map(csvEscape).join(",")];
  rows.forEach(function(r){ lines.push(r.map(csvEscape).join(",")); });
  return lines.join("\r\n");
}
function saveCsv(filename, csvText){
  if(nativeFileReady()){
    var P = window.Capacitor.Plugins;
    P.Filesystem.writeFile({ path: filename, data: csvText, directory: "CACHE", encoding: "utf8" })
      .then(function(){ return P.Filesystem.getUri({ directory: "CACHE", path: filename }); })
      .then(function(res){ return P.Share.share({ title: filename, text: "Billfold export", url: res.uri, dialogTitle: "Save your export" }); })
      .catch(function(e){
        if(e && (""+e).toLowerCase().indexOf("cancel") >= 0) return;
        csvBlobFallback(filename, csvText);
      });
    return;
  }
  csvBlobFallback(filename, csvText);
}
function csvBlobFallback(filename, csvText){
  try{
    var blob = new Blob([csvText], {type:"text/csv"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
  }catch(e){ /* best effort */ }
}

// The next upcoming reminder fire time for a single bill — mirrors rescheduleReminders()'s
// per-bill logic (same 3-month lookahead, same skip rules) so what's shown here always
// matches what will actually be scheduled.
function nextReminderFireAt(b){
  var now = new Date();
  var startY = now.getFullYear(), startM = now.getMonth()+1;
  for(var i=0;i<3;i++){
    var m = startM + i, y = startY;
    while(m>12){ m-=12; y++; }
    if(!dueInMonth(b,m)) continue;
    if(billLeftAt(y,m,b.id) === 0) continue; // already paid, skip
    var actualDay = Math.min(b.dueDay, new Date(y,m,0).getDate());
    var due = new Date(y, m-1, actualDay, 9, 0, 0);
    var fireAt = new Date(due.getTime() - (num(S.remindDays)*24*60*60*1000));
    if(fireAt.getTime() <= now.getTime()) continue; // don't count a fire time already in the past
    return fireAt;
  }
  return null;
}
function remindersBillList(){
  var bills = S.bills.filter(function(b){ return b.active && b.dueDay; });
  if(!bills.length){
    return '<p class="muted" style="font-size:.85rem">No bills have a due day set yet. Add one from Bills → edit a bill → Due day of month.</p>';
  }
  return '<ul class="plain">' + bills.map(function(b){
    var off = !!b.remindOff, on = !off;
    var sub;
    if(!S.remindersOn) sub = "Turn reminders on above to enable";
    else if(off) sub = "Muted";
    else{
      var next = nextReminderFireAt(b);
      sub = next ? "Next: " + next.toLocaleString([], {month:"short", day:"numeric", hour:"numeric", minute:"2-digit"}) : "No upcoming reminder";
    }
    return '<li><div class="bill-li">'
      + '<div style="flex:1;min-width:0"><div class="bill-name">'+esc(b.name)+'</div>'
      + '<div class="bill-cat" style="gap:0">'+esc(sub)+'</div></div>'
      + '<button class="toggle'+(on?" on":"")+'" aria-label="'+(on?"Mute reminder for "+esc(b.name):"Enable reminder for "+esc(b.name))+'" onclick="toggleBillRemind(\''+b.id+'\')"><span class="knob"></span></button>'
      + '</div></li>';
  }).join("") + '</ul>';
}

/* ---------- bill due-date reminders (local notifications, native only) ---------- */
function nativeNotifReady(){
  try{
    return !!(window.Capacitor && typeof window.Capacitor.isNativePlatform === "function"
      && window.Capacitor.isNativePlatform()
      && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications);
  }catch(e){ return false; }

// Small stable hash so each (bill, year, month) pair always maps to the same notification id.
function hashId(str){
  var h = 0;
  for(var i=0;i<str.length;i++){ h = (h*31 + str.charCodeAt(i)) | 0; }
  return Math.abs(h) % 2000000000;
}
var remindTimer = null;
function scheduleRemindersDebounced(){
  if(remindTimer) clearTimeout(remindTimer);
  remindTimer = setTimeout(rescheduleReminders, 600);
}
function rescheduleReminders(){
  if(!nativeNotifReady()) return;
  var LN = window.Capacitor.Plugins.LocalNotifications;
  LN.getPending().then(function(res){
    var ids = (res.notifications||[]).map(function(n){ return { id:n.id }; });
    return ids.length ? LN.cancel({ notifications: ids }) : Promise.resolve();
  }).then(function(){
    if(!S.remindersOn) return;
    var toSchedule = [];
    var now = new Date();
    var startY = now.getFullYear(), startM = now.getMonth()+1;
    for(var i=0;i<3;i++){
      var m = startM + i, y = startY;
      while(m>12){ m-=12; y++; }
      var data = monthDataAt(y,m);
      S.bills.forEach(function(b){
        if(!b.active || !b.dueDay) return;
        if(b.remindOff) return; // muted individually in Settings → Reminders
        if(!dueInMonth(b,m)) return;
        if(billLeftAt(y,m,b.id) === 0) return; // already paid, skip
        var actualDay = Math.min(b.dueDay, new Date(y,m,0).getDate());
        var due = new Date(y, m-1, actualDay, 9, 0, 0);
        var fireAt = new Date(due.getTime() - (num(S.remindDays)*24*60*60*1000));
        if(fireAt.getTime() <= now.getTime()) return; // don't schedule for the past
        toSchedule.push({
          id: hashId(b.id+"-"+y+"-"+m),
          title: b.name + " due soon",
          body: usd(b.amount) + " due " + MS[m-1] + " " + actualDay,
          schedule: { at: fireAt },
          actionTypeId: "BILL_REMINDER",
          extra: { billId: b.id, y:y, m:m }
        });
      });
    }
    if(toSchedule.length) return LN.schedule({ notifications: toSchedule });
  }).catch(function(){ /* best effort; a failed schedule pass isn't worth surfacing */ });
}
function setRemindersOn(on){
  if(!nativeNotifReady()){
    if(on){ S.remindersOn = false; render(); }
    return;
  }
  var LN = window.Capacitor.Plugins.LocalNotifications;
  if(!on){
    S.remindersOn = false; persist(); render(); rescheduleReminders();
    return;
  }
  LN.checkPermissions().then(function(res){
    if(res && res.display === "granted") return { display:"granted" };
    return LN.requestPermissions();
  }).then(function(res){
    if(res && res.display === "granted"){
      S.remindersOn = true; persist(); render(); rescheduleReminders();
    } else {
      S.remindersOn = false; persist(); render();
    }
  }).catch(function(){
    S.remindersOn = false; persist(); render();
  });
}
// Marks one bill fully paid for a specific month/year — used by the notification's
// "Mark paid" button, which targets the exact month the reminder was about rather
// than whatever month happens to be on screen when it's tapped.
function markBillPaidAt(billId, y, m){
  var k = mk(y,m);
  if(!S.months[k]) S.months[k] = emptyMonth();
  if(!S.months[k].left) S.months[k].left = {};
  if(!S.months[k].cards) S.months[k].cards = [0,0,0];
  S.months[k].left[billId] = 0;
  persist();
  if(view.y===y && view.m===m) render();
  if(S.remindersOn) scheduleRemindersDebounced();
}
// Jumps to the Month screen for the reminder's month and opens that bill's pay sheet —
// used by the notification's "View" button and by tapping the notification body itself.
function viewBillFromReminder(billId, y, m){

}
function onReminderAction(action){
  var extra = action && action.notification && action.notification.extra;
  if(!extra || !extra.billId) return;
  if(action.actionId === "paid") markBillPaidAt(extra.billId, extra.y, extra.m);
  else viewBillFromReminder(extra.billId, extra.y, extra.m); // "view" and the default tap both land here
}
function initReminderActions(){
  if(!nativeNotifReady()) return;
  try{
    var LN = window.Capacitor.Plugins.LocalNotifications;
    LN.registerActionTypes({ types: [
      { id: "BILL_REMINDER", actions: [
        { id: "paid", title: "Mark paid" },
        { id: "view", title: "View" }
      ] }
    ] }).catch(function(){ /* best effort */ });
    LN.addListener("localNotificationActionPerformed", function(action){
      try{ onReminderAction(action); }catch(e){ /* ignore */ }
    });
  }catch(e){ /* notification actions are a nice-to-have; ignore failures */ }
}

/* ---------- hardware / gesture back button (native only) ---------- *
 * Capacitor routes both the physical back button AND Android's edge-swipe
 * back gesture through the same @capacitor/app "backButton" event. Once you
 * listen for it, you own the behavior entirely — the platform's own default
 * (web-history-back, else exit) no longer runs. So this handler has to
 * explicitly replicate "close whatever's on top" for every layer the app
 * can have open, and fall back to exiting only when nothing is open:
 *   1. A modal/sheet (any form, the ⋯ menus, the month picker) — close it.
 *   2. A Settings detail screen — return to the Settings list.
 *   3. Otherwise — nothing left to close, so exit the app (the platform's
 *      original default when there's no web history to go back through). */
function nativeAppReady(){
  try{
    return !!(window.Capacitor && typeof window.Capacitor.isNativePlatform === "function"
      && window.Capacitor.isNativePlatform()
      && window.Capacitor.Plugins && window.Capacitor.Plugins.App);
  }catch(e){ return false; }
}
function isModalOpen(){
  var el = document.getElementById("modalRoot");
  return !!(el && el.innerHTML.trim().length);
}
function handleHardwareBack(){
  if(isModalOpen()){ closeModal(); return; }
  if(settingsSubScreen){ closeSettingsSection(); return; }
  if(toolsSubScreen){ closeToolsSection(); return; }
  try{ window.Capacitor.Plugins.App.exitApp(); }catch(e){ /* best effort */ }
}
function initHardwareBack(){
  if(!nativeAppReady()) return;
  try{
    window.Capacitor.Plugins.App.addListener("backButton", function(){
      try{ handleHardwareBack(); }catch(e){ /* ignore */ }
    });
  }catch(e){ /* back-button handling is a nice-to-have; ignore failures */ }
}

/* ---------- home screen shortcuts (native only) ---------- */
function nativeShortcutsReady(){
  try{
    return !!(window.Capacitor && typeof window.Capacitor.isNativePlatform === "function"

    });

}

var BACKUP_NAME_KEY = "billfold:lastBackupName";
function backupBaseName(){
  try{ var v = localStorage.getItem(BACKUP_NAME_KEY); if(v) return v; }catch(e){}
  return "billfold-backup";
}
// Strip characters that aren't safe in a filename on Android/Files/Drive, and fall back
// to the default if the user clears the field entirely.
function sanitizeFilename(name){
  var base = String(name==null?"":name).trim().replace(/[\\/:*?"<>|]/g,"-").replace(/\s+/g," ");
  base = base.replace(/\.txt$/i,"");
  return base || "billfold-backup";
}
function exDownload(){
  var json = JSON.stringify(S, null, 2);
  var inp = document.getElementById("exFname");
  var base = sanitizeFilename(inp ? inp.value : backupBaseName());
  if(inp) inp.value = base;
  try{ localStorage.setItem(BACKUP_NAME_KEY, base); }catch(e){}
  var fname = base + ".txt";

  // Native app: write a real file, then open the system "save / share" sheet.
  if(nativeFileReady()){
    var P = window.Capacitor.Plugins;
    P.Filesystem.writeFile({ path: fname, data: json, directory: "CACHE", encoding: "utf8" })
      .then(function(){ return P.Filesystem.getUri({ directory: "CACHE", path: fname }); })
      .then(function(res){
        return P.Share.share({
          title: "Billfold backup",
          text: "Billfold data backup",
          url: res.uri,
          dialogTitle: "Save your Billfold backup"
        });
      })
      .then(function(){ exMsg("Pick where to save it — Files, Drive, email, etc.", true); })
      .catch(function(e){
        if(e && (e.message === "Share canceled" || (""+e).indexOf("cancel") >= 0)) return;
        exMsg("Couldn't open the save sheet — use “Copy as text” below instead.", false);
      });
    return;
  }

  // Browser / PWA fallback: download via a blob link.
  try{
    var blob = new Blob([json], {type:"application/json"});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
    exMsg("Saved to your downloads. Keep it somewhere safe like Drive.", true);
  }catch(e){
    exMsg("Save was blocked here — use “Copy as text” instead.", false);
  }
}
function exCopy(){
  var ta = document.getElementById("exText");
  var done = function(){ exMsg("Copied. Paste it anywhere safe — a OneDrive note or file works well.", true); };
  var manual = function(){ ta.focus(); ta.select(); exMsg("Select the text below and copy it manually.", false); };
  if(navigator.clipboard && navigator.clipboard.writeText){
